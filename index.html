<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling Tech | DNS Auditor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0b0e14; color: #e2e8f0; padding: 12px; line-height: 1.2; font-size: 13px; }
        
        :root {
            --green: #00ff66; --red: #ff3333; --blue: #38bdf8;
            --card-bg: #161b22; --border: #30363d; --text-dim: #94a3b8;
        }

        .header-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        h1 { font-size: 1.2rem; color: #fff; display: flex; align-items: center; gap: 8px; font-weight: 800; letter-spacing: -0.5px; }
        h1::before { content: ''; width: 3px; height: 16px; background: var(--blue); display: inline-block; }

        /* WAN IP Box */
        .client-info-bar { background: #1a1f29; border: 1px solid var(--border); border-left: 3px solid var(--blue); border-radius: 4px; padding: 8px 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .ip-val { color: var(--blue); font-weight: 800; font-family: monospace; cursor: pointer; border-bottom: 1px dashed transparent; transition: 0.2s; }
        .ip-val:hover { border-bottom-color: var(--blue); }

        .status-container { display: none; grid-template-columns: 80px 1fr; gap: 10px; margin-bottom: 10px; align-items: center; }
        .score-circle { height: 60px; width: 60px; border-radius: 50%; border: 3px solid; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; background: rgba(0,0,0,0.3); }
        .score-label { font-size: 0.55rem; text-transform: uppercase; margin-top: -2px; }
        
        #masterStatus { padding: 10px; border-radius: 6px; text-align: left; font-weight: 800; font-size: 0.85rem; border: 1px solid; flex-grow: 1; }
        .master-pass { background: rgba(0, 255, 102, 0.05); color: var(--green); border-color: var(--green); }
        .master-fail { background: rgba(255, 51, 51, 0.05); color: var(--red); border-color: var(--red); }

        .controls { display: flex; gap: 6px; margin-bottom: 12px; }
        input { flex: 1; background: #0d1117; border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; color: #fff; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--blue); }
        button { border: none; border-radius: 4px; padding: 6px 14px; font-weight: 700; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
        #runBtn { background: var(--blue); color: #000; }
        #exportBtn { background: #21262d; color: #c9d1d9; border: 1px solid var(--border); display: none; }
        button:hover { opacity: 0.85; }

        .results-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .small-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; position: relative; }
        .card.pass { border-left: 3px solid var(--green); }
        .card.fail { border-left: 3px solid var(--red); }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .title { font-weight: 800; font-size: 0.7rem; text-transform: uppercase; color: #fff; }
        .badge { font-size: 0.6rem; font-weight: 900; padding: 1px 5px; border-radius: 3px; border: 1px solid; }
        .badge.pass { color: var(--green); border-color: var(--green); }
        .badge.fail { color: var(--red); border-color: var(--red); }

        .record-group { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
        .selector-label { font-size: 0.65rem; color: var(--blue); font-weight: 800; text-transform: uppercase; margin-top: 4px; }
        .record-box { background: #0d1117; border: 1px solid var(--border); padding: 6px 35px 6px 8px; border-radius: 4px; position: relative; font-family: monospace; font-size: 0.75rem; color: #7dd3fc; word-break: break-all; min-height: 28px; display: flex; align-items: center; }
        .copy-btn { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); background: #21262d; border: 1px solid var(--border); color: #8b949e; padding: 2px 4px; font-size: 0.55rem; border-radius: 2px; cursor: pointer; }
        
        .host-notice { color: var(--blue); font-size: 0.65rem; font-weight: 700; margin-bottom: 4px; display: block; }
        #loading { display: none; font-size: 0.75rem; color: var(--blue); margin-bottom: 10px; text-align: center; }

        footer { text-align: center; margin-top: 20px; padding: 10px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body onload="getClientIP()">

    <div class="header-wrap">
        <h1>STERLING TECH <span style="font-weight: 300; opacity: 0.7;">AUDITOR</span></h1>
        <button id="exportBtn" onclick="exportToCSV()">EXPORT CSV</button>
    </div>

    <div class="client-info-bar">
        <span>CLIENT WAN IP: <span id="clientIP" class="ip-val" onclick="copyToClipboard(this.innerText, this)" title="Click to Copy">Loading...</span></span>
        <span id="clientISP" style="color: var(--text-dim); font-size: 0.7rem;">Detecting Network...</span>
    </div>

    <div class="controls">
        <input type="text" id="domainInput" placeholder="Enter domain (e.g. linux.org)" autocomplete="off">
        <button id="runBtn" onclick="runAudit()">ANALYZE</button>
    </div>

    <div id="loading">Scanning Infrastructure...</div>

    <div class="status-container" id="statContainer">
        <div class="score-circle" id="scoreCircle">
            <span id="scoreVal">0</span>
            <span class="score-label">Score</span>
        </div>
        <div id="masterStatus"></div>
    </div>
    
    <div class="results-grid" id="results"></div>

    <footer>&copy; 2026 Sterling Tech | Professional Network Analysis</footer>

<script>
    let currentAuditData = [];

    async function getClientIP() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            document.getElementById('clientIP').innerText = data.ip;
            document.getElementById('clientISP').innerText = `ISP: ${data.org || 'Unknown'}`;
        } catch (e) { document.getElementById('clientIP').innerText = "Detection Failed"; }
    }

    function copyToClipboard(text, btn) {
        const el = document.createElement('textarea');
        el.value = text; document.body.appendChild(el);
        el.select(); document.execCommand('copy');
        document.body.removeChild(el);
        const old = btn.innerText; btn.innerText = "COPIED";
        setTimeout(() => { btn.innerText = (btn.id === 'clientIP' ? text : old); }, 1200);
    }

    function createRecordBox(val) {
        if (!val) return '';
        const cleanVal = val.replace(/"/g, '');
        return `<div class="record-box"><span>${cleanVal}</span><button class="copy-btn" onclick="copyToClipboard('${cleanVal.replace(/'/g, "\\'")}', this)">COPY</button></div>`;
    }

    function detectProvider(nsRecords) {
        const text = nsRecords.join(' ').toLowerCase();
        if (text.includes('cloudflare')) return "Cloudflare";
        if (text.includes('awsdns')) return "AWS Route 53";
        if (text.includes('google')) return "Google DNS";
        if (text.includes('domaincontrol')) return "GoDaddy";
        if (text.includes('azure-dns')) return "Microsoft Azure";
        return "Third-Party Provider";
    }

    async function fetchDNS(name, type) {
        try {
            const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(name)}&type=${type}`, {
                headers: { 'Accept': 'application/dns-json' }
            });
            return res.json();
        } catch (e) { return { Answer: [] }; }
    }

    async function runAudit() {
        const domain = document.getElementById('domainInput').value.trim().toLowerCase();
        if (!domain) return;
        
        document.getElementById('loading').style.display = 'block';
        document.getElementById('results').innerHTML = '';
        document.getElementById('statContainer').style.display = 'none';
        document.getElementById('exportBtn').style.display = 'none';
        currentAuditData = [];

        let score = 0;

        try {
            const [spfData, dmarcData, mxData, nsData] = await Promise.all([
                fetchDNS(domain, 'TXT'), fetchDNS(`_dmarc.${domain}`, 'TXT'),
                fetchDNS(domain, 'MX'), fetchDNS(domain, 'NS')
            ]);

            const selectors = ['google', 'selector1', 'default', 'mail', 'k1', 'ms', 'microsoft'];
            const dkimResults = await Promise.all(selectors.map(async s => {
                const data = await fetchDNS(`${s}._domainkey.${domain}`, 'TXT');
                const rec = data.Answer?.find(r => r.data.includes('v=DKIM1') || r.data.includes('p='));
                return rec ? { s, val: rec.data.replace(/"/g, '') } : null;
            }));
            const foundDkim = dkimResults.filter(x => x !== null);

            const spf = (spfData.Answer || []).find(r => r.data.includes('v=spf1'))?.data.replace(/"/g,'');
            if(spf) score += 30; if(spf?.includes('-all')) score += 5;

            const dmarc = (dmarcData.Answer || []).find(r => r.data.includes('v=DMARC1'))?.data.replace(/"/g,'');
            if(dmarc) score += 20; if(dmarc && !dmarc.includes('p=none')) score += 15;
            if(foundDkim.length > 0) score += 30;

            renderCard("SPF", "Sender authorization.", !!spf, [spf]);
            renderCard("DMARC", "Policy enforcement.", (dmarc && !dmarc.includes('p=none')), [dmarc]);

            let dkimHtml = `<div class="record-group">`;
            foundDkim.forEach(d => {
                dkimHtml += `<div class="selector-label">Selector: ${d.s}</div>${createRecordBox(d.val)}`;
                currentAuditData.push({ title: `DKIM (${d.s})`, status: 'PASS', record: d.val });
            });
            dkimHtml += `</div>`;
            renderCardRaw("DKIM", "Signature integrity.", foundDkim.length > 0, dkimHtml);

            const nsList = (nsData.Answer || []).map(r => r.data);
            const mxList = (mxData.Answer || []).map(r => r.data);
            const provider = detectProvider(nsList);

            const grid = document.getElementById('results');
            const row = document.createElement('div'); row.className = 'small-row';
            row.innerHTML = renderSmallCard("MX Records", mxList) + renderSmallCard("Nameservers", nsList, provider);
            grid.appendChild(row);

            document.getElementById('scoreVal').innerText = score;
            const circle = document.getElementById('scoreCircle');
            circle.style.borderColor = score > 80 ? 'var(--green)' : (score > 50 ? 'orange' : 'var(--red)');
            circle.style.color = circle.style.borderColor;

            document.getElementById('masterStatus').className = score > 80 ? 'master-pass' : 'master-fail';
            document.getElementById('masterStatus').innerHTML = score > 80 ? `✓ OPTIMIZED BY STERLING TECH<br><span style="font-size:0.7rem">Infrastructure is secure.</span>` : `⚠ ATTENTION REQUIRED<br><span style="font-size:0.7rem">Security gaps detected.</span>`;
            
            document.getElementById('statContainer').style.display = 'grid';
            document.getElementById('exportBtn').style.display = 'block';

        } catch (e) { console.error(e); } finally { document.getElementById('loading').style.display = 'none'; }
    }

    function renderCardRaw(title, blurb, isPass, rawHtml) {
        document.getElementById('results').innerHTML += `
            <div class="card ${isPass ? 'pass' : 'fail'}">
                <div class="card-header"><span class="title">${title}</span><span class="badge ${isPass ? 'pass' : 'fail'}">${isPass ? 'PASS' : 'FAIL'}</span></div>
                <div style="font-size:0.7rem; color:var(--text-dim)">${blurb}</div>
                ${rawHtml}
            </div>`;
    }

    function renderCard(title, blurb, isPass, records) {
        let recHtml = '<div class="record-group">';
        records.forEach(r => { if(r) { recHtml += createRecordBox(r); currentAuditData.push({ title, status: 'PASS', record: r }); } });
        recHtml += '</div>';
        renderCardRaw(title, blurb, isPass, recHtml);
    }

    function renderSmallCard(title, records, provider = null) {
        let recHtml = '<div class="record-group">';
        records.forEach(r => { recHtml += createRecordBox(r); currentAuditData.push({ title, status: 'FOUND', record: r }); });
        recHtml += '</div>';
        return `<div class="card ${records.length ? 'pass' : 'fail'}">
                <div class="card-header"><span class="title">${title}</span></div>
                ${provider ? `<span class="host-notice">Host: ${provider}</span>` : ''}
                ${recHtml}
            </div>`;
    }

    function exportToCSV() {
        let csv = "Type,Status,Record\n";
        currentAuditData.forEach(row => { csv += `"${row.title}","${row.status}","${row.record.replace(/"/g, '""')}"\n`; });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `SterlingTech_Audit_${document.getElementById('domainInput').value}.csv`; a.click();
    }
</script>
</body>
</html>
