<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling Tools | Jackson Tech</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #00ff41; /* Classic Matrix/Terminal Green */
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 95vh;
            overflow: hidden;
        }

        /* CRT Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #terminal {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.4;
            text-shadow: 0 0 5px var(--text-color);
        }

        .input-area {
            display: flex;
            margin-top: 10px;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        .prompt {
            margin-right: 10px;
            font-weight: bold;
        }

        input {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: var(--font-main);
            font-size: 1rem;
            flex-grow: 1;
            outline: none;
        }

        .system-msg { color: #888; font-style: italic; }
        .error-msg { color: #ff5555; }
        .success-msg { color: #55ff55; }
    </style>
</head>
<body>

<div id="terminal">
[SYSTEM INITIALIZED]
[LOCATION: JACKSONTECH CENTRAL]
[USER: GUEST_ACCESS]

Welcome to Sterling Tools v1.0.
Type 'help' to see available commands.
--------------------------------------------------
</div>

<div class="input-area">
    <span class="prompt">sterling@jacksontech:~$</span>
    <input type="text" id="user-input" autofocus autocomplete="off">
</div>

<script>
    const terminal = document.getElementById('terminal');
    const input = document.getElementById('user-input');

    const commands = {
        'help': "Available commands: \n- status: Check system health\n- clear: Wipe screen\n- info: About Sterling Tools\n- contact: Jackson Tech details",
        'status': "<span class='success-msg'>[OK]</span> All systems operational. GitHub Pages active.",
        'info': "Sterling Tools is a proprietary diagnostic interface for Jackson Tech infrastructure.",
        'contact': "Visit: https://jacksontech.co.uk\nEmail: admin@jacksontech.co.uk",
        'clear': ""
    };

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const fullCmd = input.value.trim().toLowerCase();
            const output = document.createElement('div');
            
            output.innerHTML = `<br><span class="prompt">sterling@jacksontech:~$</span> ${fullCmd}`;
            
            if (fullCmd === 'clear') {
                terminal.innerHTML = "[SYSTEM REBOOTED]";
            } else if (commands[fullCmd]) {
                output.innerHTML += `<br>${commands[fullCmd]}`;
            } else if (fullCmd !== "") {
                output.innerHTML += `<br><span class="error-msg">Command not found: ${fullCmd}</span>`;
            }

            terminal.appendChild(output);
            input.value = "";
            terminal.scrollTop = terminal.scrollHeight;
        }
    });
</script>
</body>
</html>
