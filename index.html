<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Security DNS Checker | Jackson Tech</title>
    <style>
        :root {
            --bg-body: #0a1118;
            --bg-card: #121d27;
            --accent: #00a8ff;
            --text-main: #e1e8ed;
            --text-dim: #8899a6;
            --success: #00fa9a;
            --warning: #ff9f43;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header { margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin: 0; color: var(--text-main); }
        p.subtitle { color: var(--text-dim); margin-top: 5px; }

        /* Search Bar Area */
        .search-box {
            display: flex; gap: 10px; margin-bottom: 40px;
            background: var(--bg-card); padding: 10px; border-radius: 8px;
            border: 1px solid #23313f;
        }

        input[type="text"] {
            flex-grow: 1; background: transparent; border: none;
            color: white; font-size: 1.1rem; outline: none; padding: 10px;
        }

        button {
            background: var(--accent); color: white; border: none;
            padding: 10px 30px; border-radius: 6px; cursor: pointer;
            font-weight: bold; transition: 0.2s;
        }

        button:hover { opacity: 0.8; }

        /* Result Cards */
        .card {
            background: var(--bg-card); border-radius: 10px;
            padding: 25px; margin-bottom: 20px;
            border-left: 5px solid #23313f;
        }

        .card.found { border-left-color: var(--success); }
        .card.warning { border-left-color: var(--warning); }

        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .tag { font-size: 0.8rem; padding: 3px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .tag.green { background: rgba(0, 250, 154, 0.1); color: var(--success); }
        .tag.orange { background: rgba(255, 159, 67, 0.1); color: var(--warning); }

        .record-box {
            background: #090e14; padding: 15px; border-radius: 6px;
            font-family: 'Courier New', monospace; font-size: 0.9rem;
            word-break: break-all; margin-top: 10px; position: relative;
        }

        .copy-btn {
            position: absolute; right: 10px; top: 10px;
            background: #23313f; color: var(--text-dim); border: none;
            font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Email Security DNS Checker</h1>
        <p class="subtitle">Check SPF, DKIM, DMARC, MX, and NS records for any domain</p>
    </header>

    <div class="search-box">
        <input type="text" id="domainInput" placeholder="yourdomain.com">
        <button onclick="checkDNS()">Check</button>
    </div>

    <div id="results">
        </div>
</div>

<script>
    async function fetchDNS(domain, type) {
        const res = await fetch(`https://dns.google/resolve?name=${domain}&type=${type}`);
        const data = await res.json();
        return data.Answer || [];
    }

    async function checkDNS() {
        const domain = document.getElementById('domainInput').value;
        const resultsDiv = document.getElementById('results');
        if (!domain) return;

        resultsDiv.innerHTML = "Searching...";

        const mx = await fetchDNS(domain, 'MX');
        const txt = await fetchDNS(domain, 'TXT');

        let spf = txt.find(r => r.data.includes('v=spf1'));
        let dmarc = await fetchDNS(`_dmarc.${domain}`, 'TXT');

        resultsDiv.innerHTML = `
            <div class="card ${spf ? 'found' : 'warning'}">
                <div class="card-header">
                    <strong>SPF Record</strong>
                    <span class="tag ${spf ? 'green' : 'orange'}">${spf ? 'Found' : 'Warn'}</span>
                </div>
                <div class="record-box">${spf ? spf.data : 'No SPF record found. Spoofing protection is disabled.'}</div>
            </div>

            <div class="card ${dmarc.length ? 'found' : 'warning'}">
                <div class="card-header">
                    <strong>DMARC Record</strong>
                    <span class="tag ${dmarc.length ? 'green' : 'orange'}">${dmarc.length ? 'Found' : 'Warn'}</span>
                </div>
                <div class="record-box">${dmarc.length ? dmarc[0].data : 'No DMARC record found. Policy enforcement missing.'}</div>
            </div>

            <div class="card ${mx.length ? 'found' : 'warning'}">
                <div class="card-header">
                    <strong>MX Records</strong>
                    <span class="tag ${mx.length ? 'green' : 'orange'}">${mx.length ? 'Found' : 'Not Found'}</span>
                </div>
                <div class="record-box">
                    ${mx.map(r => r.data).join('<br>')}
                </div>
            </div>
        `;
    }
</script>

</body>
</html>
