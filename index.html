<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling DNS Auditor | Jackson Tech</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0b0e14; color: #e2e8f0; padding: 15px; line-height: 1.3; font-size: 14px; }
        
        :root {
            --green: #00ff66; --red: #ff3333; --blue: #38bdf8;
            --card-bg: #161b22; --border: #30363d; --text-dim: #94a3b8;
        }

        .header-wrap { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        h1 { font-size: 1.3rem; color: #fff; display: flex; align-items: center; gap: 8px; }
        h1::before { content: ''; width: 3px; height: 18px; background: var(--blue); display: inline-block; }

        #masterStatus { display: none; padding: 10px; border-radius: 6px; margin-bottom: 12px; text-align: center; font-weight: 800; font-size: 0.9rem; border: 1px solid; }
        .master-pass { background: rgba(0, 255, 102, 0.05); color: var(--green); border-color: var(--green); }
        .master-fail { background: rgba(255, 51, 51, 0.05); color: var(--red); border-color: var(--red); }

        .controls { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; background: #0d1117; border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; color: #fff; outline: none; }
        button { border: none; border-radius: 4px; padding: 8px 16px; font-weight: 700; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        #runBtn { background: var(--blue); color: #000; }
        #exportBtn { background: #21262d; color: #c9d1d9; border: 1px solid var(--border); display: none; }
        button:hover { opacity: 0.8; }

        /* Compact Layout */
        .results-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .small-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; position: relative; }
        .card.pass { border-left: 4px solid var(--green); }
        .card.fail { border-left: 4px solid var(--red); }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .title { font-weight: 800; font-size: 0.75rem; text-transform: uppercase; color: #fff; }
        .badge { font-size: 0.65rem; font-weight: 900; padding: 2px 6px; border-radius: 3px; border: 1px solid; }
        .badge.pass { color: var(--green); border-color: var(--green); }
        .badge.fail { color: var(--red); border-color: var(--red); }

        .blurb { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; line-height: 1.2; }
        .record-box { background: #0d1117; border: 1px solid var(--border); padding: 8px; border-radius: 4px; position: relative; font-family: monospace; font-size: 0.8rem; color: #7dd3fc; word-break: break-all; margin-top: 5px; }
        .copy-btn { position: absolute; right: 5px; top: 5px; background: #21262d; border: 1px solid var(--border); color: #8b949e; padding: 2px 5px; font-size: 0.6rem; border-radius: 3px; cursor: pointer; }
        
        .host-notice { background: rgba(56, 189, 248, 0.1); color: var(--blue); padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; margin-top: 8px; display: inline-block; }

        #loading { display: none; font-size: 0.8rem; color: var(--blue); margin-bottom: 10px; text-align: center; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #333; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="header-wrap">
        <div>
            <h1>Sterling DNS Auditor</h1>
            <p style="font-size: 0.75rem; color: var(--text-dim)">Jackson Tech Security Suite</p>
        </div>
        <button id="exportBtn" onclick="exportToCSV()">EXPORT CSV</button>
    </div>

    <div class="controls">
        <input type="text" id="domainInput" placeholder="Enter domain..." autofocus>
        <button id="runBtn" onclick="runAudit()">ANALYZE</button>
    </div>

    <div id="masterStatus"></div>
    <div id="loading"><span class="spinner"></span> Scanning Infrastructure...</div>
    
    <div class="results-grid" id="results"></div>

<script>
    let currentAuditData = [];

    function copyToClipboard(text, btn) {
        const el = document.createElement('textarea');
        el.value = text; document.body.appendChild(el);
        el.select(); document.execCommand('copy');
        document.body.removeChild(el);
        btn.innerText = "DONE";
        setTimeout(() => { btn.innerText = "COPY"; }, 1500);
    }

    function detectProvider(nsRecords) {
        const text = nsRecords.join(' ').toLowerCase();
        if (text.includes('cloudflare')) return "Cloudflare";
        if (text.includes('awsdns')) return "AWS Route 53";
        if (text.includes('googledomains') || text.includes('google')) return "Google DNS";
        if (text.includes('domaincontrol')) return "GoDaddy";
        if (text.includes('azure-dns')) return "Microsoft Azure";
        if (text.includes('fasthosts')) return "Fasthosts";
        return "Third-Party Provider";
    }

    async function fetchDNS(name, type) {
        const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(name)}&type=${type}`, {
            headers: { 'Accept': 'application/dns-json' }
        });
        return res.json();
    }

    async function runAudit() {
        const domain = document.getElementById('domainInput').value.trim().toLowerCase();
        if (!domain) return;
        
        document.getElementById('loading').style.display = 'block';
        document.getElementById('results').innerHTML = '';
        document.getElementById('masterStatus').style.display = 'none';
        document.getElementById('exportBtn').style.display = 'none';
        currentAuditData = [];

        let totalPass = true;

        try {
            const [spfData, dmarcData, mxData, nsData] = await Promise.all([
                fetchDNS(domain, 'TXT'), fetchDNS(`_dmarc.${domain}`, 'TXT'),
                fetchDNS(domain, 'MX'), fetchDNS(domain, 'NS')
            ]);

            // DKIM Parallel
            const selectors = ['google', 'selector1', 'default', 'mail', 'k1', 'ms', 'microsoft'];
            const dkimResults = await Promise.all(selectors.map(async s => {
                const data = await fetchDNS(`${s}._domainkey.${domain}`, 'TXT');
                const rec = data.Answer?.find(r => r.data.includes('v=DKIM1') || r.data.includes('p='));
                return rec ? { s, val: rec.data.replace(/"/g, '') } : null;
            }));
            const foundDkim = dkimResults.filter(x => x !== null);

            // Audit Logic
            const spf = (spfData.Answer || []).find(r => r.data.includes('v=spf1'))?.data.replace(/"/g,'');
            const dmarc = (dmarcData.Answer || []).find(r => r.data.includes('v=DMARC1'))?.data.replace(/"/g,'');
            const dmarcEnforced = dmarc && (dmarc.includes('p=quarantine') || dmarc.includes('p=reject'));
            
            if (!spf || !dmarcEnforced || foundDkim.length === 0) totalPass = false;

            const nsList = (nsData.Answer || []).map(r => r.data);
            const provider = detectProvider(nsList);

            // Render Cards
            renderCard("SPF", spf, !!spf, "Prevents domain spoofing.");
            renderCard("DMARC", dmarc, dmarcEnforced, "Enforces email security policy.");
            renderCard("DKIM", foundDkim.map(d => `[${d.s}]: ${d.val}`).join('\n'), foundDkim.length > 0, "Digital signature for integrity.");
            
            const resultsDiv = document.getElementById('results');
            const row = document.createElement('div'); row.className = 'small-row';
            row.innerHTML = renderSmallCard("MX Records", (mxData.Answer || []).map(r => r.data).join('\n'), "Mail routing.") +
                            renderSmallCard("Nameservers", nsList.join('\n'), "DNS Hosting.", provider);
            resultsDiv.appendChild(row);

            // Master Status
            const master = document.getElementById('masterStatus');
            master.style.display = 'block';
            master.className = totalPass ? 'master-pass' : 'master-fail';
            master.innerText = totalPass ? `✓ SYSTEM OPTIMIZED: ${domain.toUpperCase()}` : `⚠ ACTION REQUIRED: ${domain.toUpperCase()}`;
            document.getElementById('exportBtn').style.display = 'block';

        } catch (e) {
            alert("DNS Query Failed.");
        } finally { document.getElementById('loading').style.display = 'none'; }
    }

    function renderCard(title, record, isPass, blurb) {
        currentAuditData.push({ title, status: isPass ? 'PASS' : 'FAIL', record: record || 'NONE' });
        const html = `
            <div class="card ${isPass ? 'pass' : 'fail'}">
                <div class="card-header"><span class="title">${title}</span><span class="badge ${isPass ? 'pass' : 'fail'}">${isPass ? 'PASS' : 'FAIL'}</span></div>
                <div class="blurb">${blurb}</div>
                ${record ? `<div class="record-box">${record}<button class="copy-btn" onclick="copyToClipboard('${record.replace(/'/g, "\\'")}', this)">COPY</button></div>` : ''}
            </div>`;
        document.getElementById('results').innerHTML += html;
    }

    function renderSmallCard(title, record, blurb, provider = null) {
        currentAuditData.push({ title, status: record ? 'FOUND' : 'MISSING', record: record || 'NONE' });
        return `
            <div class="card ${record ? 'pass' : 'fail'}">
                <div class="card-header"><span class="title">${title}</span></div>
                ${provider ? `<div class="host-notice">Host: ${provider}</div>` : ''}
                <div class="record-box" style="font-size:0.7rem">${record || 'Missing'}<button class="copy-btn" onclick="copyToClipboard('${record.replace(/'/g, "\\'")}', this)">COPY</button></div>
            </div>`;
    }

    function exportToCSV() {
        let csv = "Type,Status,Record\n";
        currentAuditData.forEach(row => { csv += `"${row.title}","${row.status}","${row.record.replace(/"/g, '""')}"\n`; });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `Audit_${document.getElementById('domainInput').value}.csv`;
        a.click();
    }
</script>
</body>
</html>
