<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling DNS Auditor | Jackson Tech</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0b0e14; color: #e2e8f0; padding: 24px; line-height: 1.5; }
        
        :root {
            --green: #00ff66;
            --red: #ff3333;
            --blue: #38bdf8;
            --card-bg: #161b22;
            --border: #30363d;
        }

        h1 { font-size: 1.6rem; color: #fff; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        h1::before { content: ''; width: 4px; height: 24px; background: var(--blue); display: inline-block; border-radius: 2px; }

        .search-container { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; display: flex; gap: 10px; }
        input { flex: 1; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 12px; color: #fff; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--blue); }
        button#runBtn { background: var(--blue); color: #000; border: none; border-radius: 6px; padding: 0 25px; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
        button#runBtn:hover { background: #fff; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 15px; transition: 0.3s; }
        .card.pass { border-left: 5px solid var(--green); }
        .card.fail { border-left: 5px solid var(--red); }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .title { font-weight: 800; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .badge { font-size: 0.7rem; font-weight: 900; padding: 4px 10px; border-radius: 4px; border: 1px solid; }
        .badge.pass { color: var(--green); background: rgba(0, 255, 102, 0.1); }
        .badge.fail { color: var(--red); background: rgba(255, 51, 51, 0.1); }

        .record-box { background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 6px; position: relative; font-family: 'Consolas', monospace; font-size: 0.85rem; color: #7dd3fc; word-break: break-all; margin-top: 8px; }
        .copy-btn { position: absolute; right: 8px; top: 8px; background: #21262d; border: 1px solid var(--border); color: #8b949e; padding: 4px 8px; font-size: 0.65rem; border-radius: 4px; cursor: pointer; z-index: 5; }
        .copy-btn:hover { color: #fff; background: var(--border); }

        .msg { font-size: 0.85rem; margin-top: 10px; font-weight: 600; }
        .msg.pass { color: var(--green); }
        .msg.fail { color: var(--red); }

        #loading { display: none; color: var(--blue); margin-bottom: 20px; font-weight: 600; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(56, 189, 248, 0.2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1>Sterling DNS Auditor</h1>
    <div class="search-container">
        <input type="text" id="domainInput" placeholder="Enter domain name..." autocomplete="off">
        <button id="runBtn">ANALYZE</button>
    </div>

    <div id="loading"><span class="spinner"></span> Scanning DNS Clusters...</div>
    <div id="results"></div>

<script>
    // FIX: Robust Copy Function for GitHub Pages / Mobile
    function copyToClipboard(text, btn) {
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        
        const originalText = btn.innerText;
        btn.innerText = "COPIED!";
        btn.style.color = "#00ff66";
        setTimeout(() => { btn.innerText = originalText; btn.style.color = ""; }, 2000);
    }

    async function fetchDNS(name, type) {
        const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(name)}&type=${type}`, {
            headers: { 'Accept': 'application/dns-json' }
        });
        return res.json();
    }

    async function runAudit() {
        const domain = document.getElementById('domainInput').value.trim().toLowerCase();
        if (!domain) return;

        const loader = document.getElementById('loading');
        const results = document.getElementById('results');
        
        loader.style.display = 'block';
        results.innerHTML = '';

        try {
            // 1. Core DNS Lookups
            const [spfData, dmarcData, mxData, nsData] = await Promise.all([
                fetchDNS(domain, 'TXT'),
                fetchDNS(`_dmarc.${domain}`, 'TXT'),
                fetchDNS(domain, 'MX'),
                fetchDNS(domain, 'NS')
            ]);

            // 2. Parallel DKIM Selector Scan (Popular Microsoft/Google/Common)
            const selectors = ['google', 'selector1', 'selector2', 'default', 'mail', 'dkim', 'k1', 'smtp', 'ms', 'microsoft'];
            const dkimPromises = selectors.map(async s => {
                const data = await fetchDNS(`${s}._domainkey.${domain}`, 'TXT');
                if (data.Answer) {
                    const rec = data.Answer.find(r => r.data.includes('v=DKIM1') || r.data.includes('p='));
                    if (rec) return { selector: s, data: rec.data.replace(/"/g, '') };
                }
                return null;
            });
            const foundDkim = (await Promise.all(dkimPromises)).filter(x => x !== null);

            // 3. Process & Render SPF
            const spfRec = (spfData.Answer || []).find(r => r.data.includes('v=spf1'))?.data.replace(/"/g,'');
            const spfPass = spfRec && (spfRec.includes('-all') || spfRec.includes('~all')); 
            // Note: We'll mark ~all as Pass but warn in text, or you can force -all to be the only pass.
            renderCard("SPF Record", spfRec, spfPass, spfPass ? "✓ SPF Found" : "✗ SPF Missing or Broken");

            // 4. Process & Render DMARC
            const dmarcRec = (dmarcData.Answer || []).find(r => r.data.includes('v=DMARC1'))?.data.replace(/"/g,'');
            const dmarcPass = dmarcRec && (dmarcRec.includes('p=quarantine') || dmarcRec.includes('p=reject'));
            renderCard("DMARC Enforcement", dmarcRec, dmarcPass, dmarcPass ? "✓ Enforcement Active" : "✗ Policy set to none or missing");

            // 5. Process & Render DKIM
            const dkimPass = foundDkim.length > 0;
            const dkimString = foundDkim.map(d => `[${d.selector}]: ${d.data}`).join('\n\n');
            renderCard("DKIM Records", dkimString, dkimPass, dkimPass ? `✓ Found ${foundDkim.length} selector(s)` : "✗ No common selectors found");

            // 6. MX & NS
            const mxs = (mxData.Answer || []).map(r => r.data).join('\n');
            renderCard("MX Records", mxs, !!mxs, mxs ? "✓ Mail Routing Active" : "✗ No MX records");

            const nss = (nsData.Answer || []).map(r => r.data).join('\n');
            renderCard("Nameservers", nss, !!nss, nss ? "✓ DNS Resolved" : "✗ No Nameservers");

        } catch (e) {
            results.innerHTML = `<div class="card fail">Error querying DNS. Please check domain syntax.</div>`;
        } finally {
            loader.style.display = 'none';
        }
    }

    function renderCard(title, record, isPass, msg) {
        const container = document.getElementById('results');
        const html = `
            <div class="card ${isPass ? 'pass' : 'fail'}">
                <div class="card-header">
                    <span class="title">${title}</span>
                    <span class="badge ${isPass ? 'pass' : 'fail'}">${isPass ? 'PASSED' : 'FAILED'}</span>
                </div>
                ${record ? `
                    <div class="record-box">
                        ${record.replace(/\n/g, '<br>')}
                        <button class="copy-btn" onclick="copyToClipboard(\`${record}\`, this)">COPY</button>
                    </div>
                ` : ''}
                <div class="msg ${isPass ? 'pass' : 'fail'}">${msg}</div>
            </div>
        `;
        container.innerHTML += html;
    }

    document.getElementById('runBtn').addEventListener('click', runAudit);
    document.getElementById('domainInput').addEventListener('keydown', (e) => { if(e.key === 'Enter') runAudit(); });
</script>
</body>
</html>
