<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling Tech | DNS Auditor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0b0e14; color: #e2e8f0; padding: 12px; line-height: 1.2; font-size: 13px; }
        
        :root {
            --green: #00ff66; --red: #ff3333; --blue: #38bdf8; --purple: #a855f7;
            --card-bg: #161b22; --border: #30363d; --text-dim: #94a3b8;
        }

        .header-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        h1 { font-size: 1.2rem; color: #fff; display: flex; align-items: center; gap: 8px; font-weight: 800; }
        h1::before { content: ''; width: 3px; height: 16px; background: var(--blue); display: inline-block; }

        .client-info-bar { background: #1a1f29; border: 1px solid var(--border); border-left: 3px solid var(--blue); border-radius: 4px; padding: 8px 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .ip-val { color: var(--blue); font-weight: 800; font-family: monospace; cursor: pointer; }

        /* Tenant ID Lookup Box */
        .tenant-lookup-bar { background: #1a1f29; border: 1px solid var(--border); border-left: 3px solid var(--purple); border-radius: 4px; padding: 10px; margin-bottom: 12px; display: grid; grid-template-columns: 1fr 120px; gap: 8px; align-items: center; }
        .tenant-input { background: #0d1117; border: 1px solid var(--border); border-radius: 4px; padding: 6px; color: #fff; font-size: 0.75rem; outline: none; }
        .tenant-input:focus { border-color: var(--purple); }
        .tenant-btn { background: var(--purple); color: #fff; border: none; border-radius: 4px; padding: 6px; font-weight: 700; cursor: pointer; font-size: 0.7rem; }
        .tenant-result { grid-column: span 2; margin-top: 5px; background: #0d1117; padding: 6px; border-radius: 4px; font-family: monospace; color: #d8b4fe; font-size: 0.75rem; display: none; justify-content: space-between; align-items: center; }

        .status-container { display: none; grid-template-columns: 80px 1fr; gap: 10px; margin-bottom: 10px; align-items: center; }
        .score-circle { height: 60px; width: 60px; border-radius: 50%; border: 3px solid; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; background: rgba(0,0,0,0.3); }
        .score-label { font-size: 0.55rem; text-transform: uppercase; margin-top: -2px; }
        
        #masterStatus { padding: 10px; border-radius: 6px; text-align: left; font-weight: 800; font-size: 0.85rem; border: 1px solid; flex-grow: 1; }
        .master-pass { background: rgba(0, 255, 102, 0.05); color: var(--green); border-color: var(--green); }
        .master-fail { background: rgba(255, 51, 51, 0.05); color: var(--red); border-color: var(--red); }

        .controls { display: flex; gap: 6px; margin-bottom: 12px; }
        input { flex: 1; background: #0d1117; border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; color: #fff; outline: none; }
        button#runBtn { background: var(--blue); color: #000; border: none; border-radius: 4px; padding: 6px 14px; font-weight: 700; cursor: pointer; }
        #exportBtn { background: #21262d; color: #c9d1d9; border: 1px solid var(--border); display: none; }

        .results-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .small-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; position: relative; }
        .card.pass { border-left: 3px solid var(--green); }
        .card.fail { border-left: 3px solid var(--red); }
        .title { font-weight: 800; font-size: 0.7rem; text-transform: uppercase; color: #fff; }
        .record-group { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
        .record-box { background: #0d1117; border: 1px solid var(--border); padding: 6px 35px 6px 8px; border-radius: 4px; position: relative; font-family: monospace; font-size: 0.75rem; color: #7dd3fc; word-break: break-all; min-height: 28px; display: flex; align-items: center; }
        .copy-btn { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); background: #21262d; border: 1px solid var(--border); color: #8b949e; padding: 2px 4px; font-size: 0.55rem; border-radius: 2px; cursor: pointer; }
        
        footer { text-align: center; margin-top: 20px; padding: 10px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase; }
    </style>
</head>
<body onload="getClientIP()">

    <div class="header-wrap">
        <h1>STERLING TECH <span style="font-weight: 300; opacity: 0.7;">AUDITOR</span></h1>
        <button id="exportBtn" onclick="exportToCSV()">EXPORT CSV</button>
    </div>

    <div class="client-info-bar">
        <span>CLIENT WAN IP: <span id="clientIP" class="ip-val" onclick="copyToClipboard(this.innerText, this)">Loading...</span></span>
        <span id="clientISP" style="color: var(--text-dim); font-size: 0.7rem;">Detecting Network...</span>
    </div>

    <div class="tenant-lookup-bar">
        <input type="text" id="tenantInput" class="tenant-input" placeholder="Microsoft Fallback (e.g. domain.onmicrosoft.com)">
        <button class="tenant-btn" onclick="lookupTenant()">FIND TENANT ID</button>
        <div id="tenantResult" class="tenant-result">
            <span id="tenantGuid"></span>
            <button class="copy-btn" style="position:relative; transform:none; right:0; top:0;" onclick="copyToClipboard(document.getElementById('tenantGuid').innerText, this)">COPY</button>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="domainInput" placeholder="Enter domain to audit (e.g. domain.com)">
        <button id="runBtn" onclick="runAudit()">ANALYZE</button>
    </div>

    <div id="loading" style="display:none; text-align:center; color:var(--blue); margin-bottom:10px;">Scanning...</div>

    <div class="status-container" id="statContainer">
        <div class="score-circle" id="scoreCircle">
            <span id="scoreVal">0</span>
            <span class="score-label">Score</span>
        </div>
        <div id="masterStatus"></div>
    </div>
    
    <div class="results-grid" id="results"></div>

    <footer>&copy; 2026 Sterling Tech | Professional Network Analysis</footer>

<script>
    let currentAuditData = [];

    // MS Tenant ID Lookup Function
    async function lookupTenant() {
        const domain = document.getElementById('tenantInput').value.trim();
        const resDiv = document.getElementById('tenantResult');
        const guidSpan = document.getElementById('tenantGuid');
        if (!domain) return;

        try {
            // Using the Microsoft OpenID configuration endpoint
            const response = await fetch(`https://login.microsoftonline.com/${domain}/.well-known/openid-configuration`);
            const data = await response.json();
            // The tenant ID is the GUID in the authorization_endpoint URL
            const tenantId = data.authorization_endpoint.split('/')[3];
            guidSpan.innerText = tenantId;
            resDiv.style.display = 'flex';
        } catch (e) {
            guidSpan.innerText = "Error: Invalid domain or non-MS tenant";
            resDiv.style.display = 'flex';
        }
    }

    async function getClientIP() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            document.getElementById('clientIP').innerText = data.ip;
            document.getElementById('clientISP').innerText = `ISP: ${data.org || 'Unknown'}`;
        } catch (e) { document.getElementById('clientIP').innerText = "Detection Failed"; }
    }

    function copyToClipboard(text, btn) {
        const el = document.createElement('textarea');
        el.value = text; document.body.appendChild(el);
        el.select(); document.execCommand('copy');
        document.body.removeChild(el);
        const old = btn.innerText; btn.innerText = "COPIED";
        setTimeout(() => { btn.innerText = (btn.classList.contains('ip-val') ? text : "COPY"); }, 1200);
    }

    // --- Standard DNS Functions (Summarized for brevity) ---
    async function fetchDNS(name, type) {
        const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(name)}&type=${type}`, { headers: { 'Accept': 'application/dns-json' } });
        return res.json();
    }

    async function runAudit() {
        const domain = document.getElementById('domainInput').value.trim().toLowerCase();
        if (!domain) return;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('results').innerHTML = '';
        document.getElementById('statContainer').style.display = 'none';
        currentAuditData = [];
        let score = 0;

        try {
            const [spfData, dmarcData, mxData, nsData] = await Promise.all([fetchDNS(domain, 'TXT'), fetchDNS(`_dmarc.${domain}`, 'TXT'), fetchDNS(domain, 'MX'), fetchDNS(domain, 'NS')]);
            const selectors = ['google', 'selector1', 'default', 'mail', 'k1', 'ms', 'microsoft'];
            const dkimResults = await Promise.all(selectors.map(async s => {
                const data = await fetchDNS(`${s}._domainkey.${domain}`, 'TXT');
                const rec = data.Answer?.find(r => r.data.includes('v=DKIM1') || r.data.includes('p='));
                return rec ? { s, val: rec.data.replace(/"/g, '') } : null;
            }));
            const foundDkim = dkimResults.filter(x => x !== null);

            // Logic & Rendering (Same as before)
            const spf = (spfData.Answer || []).find(r => r.data.includes('v=spf1'))?.data.replace(/"/g,'');
            if(spf) score += 35;
            const dmarc = (dmarcData.Answer || []).find(r => r.data.includes('v=DMARC1'))?.data.replace(/"/g,'');
            if(dmarc && !dmarc.includes('p=none')) score += 35;
            if(foundDkim.length > 0) score += 30;

            renderCard("SPF", "Sender authorization.", !!spf, [spf]);
            renderCard("DMARC", "Policy enforcement.", (dmarc && !dmarc.includes('p=none')), [dmarc]);
            let dkimHtml = `<div class="record-group">`;
            foundDkim.forEach(d => { dkimHtml += `<div style="font-size:0.6rem; color:var(--blue); font-weight:800; margin-top:4px;">SELECTOR: ${d.s}</div>` + createRecordBox(d.val); });
            dkimHtml += `</div>`;
            renderCardRaw("DKIM", "Signature integrity.", foundDkim.length > 0, dkimHtml);

            const grid = document.getElementById('results');
            const row = document.createElement('div'); row.className = 'small-row';
            row.innerHTML = renderSmallCard("MX Records", (mxData.Answer || []).map(r => r.data)) + renderSmallCard("Nameservers", (nsData.Answer || []).map(r => r.data));
            grid.appendChild(row);

            document.getElementById('scoreVal').innerText = score;
            document.getElementById('scoreCircle').style.borderColor = score > 80 ? 'var(--green)' : 'var(--red)';
            document.getElementById('masterStatus').className = score > 80 ? 'master-pass' : 'master-fail';
            document.getElementById('masterStatus').innerHTML = score > 80 ? `✓ OPTIMIZED BY STERLING TECH` : `⚠ ATTENTION REQUIRED`;
            document.getElementById('statContainer').style.display = 'grid';
            document.getElementById('exportBtn').style.display = 'block';
        } catch (e) { console.error(e); } finally { document.getElementById('loading').style.display = 'none'; }
    }

    function createRecordBox(val) {
        return `<div class="record-box"><span>${val}</span><button class="copy-btn" onclick="copyToClipboard('${val.replace(/'/g, "\\'")}', this)">COPY</button></div>`;
    }
    function renderCardRaw(title, blurb, isPass, rawHtml) {
        document.getElementById('results').innerHTML += `<div class="card ${isPass ? 'pass' : 'fail'}"><div class="card-header"><span class="title">${title}</span></div><div style="font-size:0.65rem; color:var(--text-dim)">${blurb}</div>${rawHtml}</div>`;
    }
    function renderCard(title, blurb, isPass, records) {
        let h = '<div class="record-group">';
        records.forEach(r => { if(r) h += createRecordBox(r); });
        h += '</div>'; renderCardRaw(title, blurb, isPass, h);
    }
    function renderSmallCard(title, records) {
        let h = '<div class="record-group">';
        records.forEach(r => { h += createRecordBox(r); });
        h += '</div>'; return `<div class="card pass"><div class="card-header"><span class="title">${title}</span></div>${h}</div>`;
    }
</script>
</body>
</html>
