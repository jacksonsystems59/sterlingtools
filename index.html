
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling Tools | Jackson Tech</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --green: #20C20E;
            --dark-green: #0d4b06;
            --bg: #050505;
        }

        body, html {
            background: var(--bg);
            margin: 0; padding: 0;
            overflow: hidden;
            font-family: 'VT323', monospace;
            color: var(--green);
            height: 100vh;
        }

        /* The "Glass" Effect */
        .screen {
            width: 100vw; height: 100vh;
            border: 2px solid #333;
            box-sizing: border-box;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 3px, 3px 100%;
            position: relative;
            padding: 40px;
            display: flex; flex-direction: column;
        }

        /* Scanline Animation */
        .screen::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0; z-index: 2;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.27; }
            50% { opacity: 0.32; }
            100% { opacity: 0.29; }
        }

        #terminal {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--green), 0 0 20px var(--dark-green);
            scrollbar-width: none;
        }

        .input-line {
            display: flex;
            align-items: center;
            font-size: 1.5rem;
            margin-top: 10px;
        }

        input {
            background: transparent; border: none; outline: none;
            color: var(--green); font-family: inherit; font-size: inherit;
            flex-grow: 1; text-shadow: 0 0 5px var(--green);
        }

        /* The Vignette (Dark Corners) */
        .overlay {
            pointer-events: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="overlay"></div>
<div class="screen">
    <div id="terminal">
        [SYSTEM INITIALIZING...]<br>
        [NODE: STERLING-TOOLS-ALPHA]<br>
        [ENCRYPTION: AES-256 ACTIVE]<br>
        ------------------------------------------<br>
        Welcome, Administrator.<br>
        Type 'help' for diagnostics.<br>
    </div>
    <div class="input-line">
        <span>sterling@jacksontech:~$ &nbsp;</span>
        <input type="text" id="cmd-input" autofocus spellcheck="false" autocomplete="off">
    </div>
</div>

<script>
    const term = document.getElementById('terminal');
    const input = document.getElementById('cmd-input');

    const responses = {
        'help': "DIAGNOSTIC CMDS: \n > status - Check node health\n > scan - Network sweep\n > clear - Reset terminal\n > contact - HQ Details",
        'status': "[OK] ALL SYSTEMS NOMINAL. LOAD BALANCER: CLOUDFLARE/GITHUB.",
        'scan': "SCANNING JACKSONTECH INFRASTRUCTURE... \n [!] 12 DEVICES FOUND. ALL SECURE.",
        'contact': "JACKSON TECH CENTRAL\n WEB: jacksontech.co.uk\n SECURE LINE: ENABLED"
    };

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = input.value.trim().toLowerCase();
            const p = document.createElement('div');
            p.innerHTML = `<br><span>sterling@jacksontech:~$</span> ${val}`;
            
            if (val === 'clear') { term.innerHTML = "[SYSTEM RESET]"; }
            else if (responses[val]) { p.innerHTML += `<br>${responses[val].replace(/\n/g, '<br>')}`; }
            else if (val !== "") { p.innerHTML += `<br><span style="color:red">ERROR: CMD NOT RECOGNIZED</span>`; }

            term.appendChild(p);
            input.value = "";
            term.scrollTop = term.scrollHeight;
        }
    });
</script>
</body>
</html>
