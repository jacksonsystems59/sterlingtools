<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling DNS Auditor | Jackson Tech</title>
    <style>
        :root {
            --bg-body: #06090f;
            --bg-card: #0d1117;
            --bg-input: #161b22;
            --text-main: #c9d1d9;
            --accent: #238636;
            --danger: #da3633;
            --warning: #d29922;
            --border: #30363d;
            --blue: #58a6ff;
        }

        body { background: var(--bg-body); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-area { display: flex; gap: 10px; background: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 30px; }
        
        input { flex-grow: 1; background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .export-btn { background: #21262d; border: 1px solid var(--border); }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; position: relative; overflow: hidden; }
        .card-status-bar { height: 4px; width: 100%; position: absolute; top: 0; left: 0; }
        .content { padding: 20px; }

        .badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: bold; margin-left: 10px; text-transform: uppercase; border: 1px solid transparent; }
        .badge-passed { background: rgba(35, 134, 54, 0.2); color: #3fb950; border-color: var(--accent); }
        .badge-failed { background: rgba(218, 54, 51, 0.2); color: #f85149; border-color: var(--danger); }
        .badge-missing { background: rgba(248, 81, 73, 0.1); color: #f85149; border-style: dashed; }

        .record-val { background: #010409; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 13px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #161b22; }
        .copy-link { color: var(--blue); font-size: 11px; cursor: pointer; user-select: none; margin-left: 10px; }
        .copy-link:hover { text-decoration: underline; }

        .passed-bar { background: var(--accent); }
        .failed-bar { background: var(--danger); }
        .loading { text-align: center; padding: 20px; font-style: italic; color: var(--blue); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h1>Sterling DNS Auditor</h1>
        <button class="export-btn" id="exportBtn" style="display:none;" onclick="exportResults()">Export CSV</button>
    </div>

    <div class="search-area">
        <input type="text" id="domainInput" placeholder="Enter domain (e.g. jacksontech.co.uk)">
        <button onclick="runAudit()">Audit Domain</button>
    </div>

    <div id="resultsGrid"></div>
</div>

<script>
    let currentResults = [];

    async function fetchDns(domain, type) {
        try {
            const r = await fetch(`https://dns.google/resolve?name=${domain}&type=${type}`);
            const d = await r.json();
            return d.Answer || [];
        } catch (e) { return []; }
    }

    async function runAudit() {
        const domain = document.getElementById('domainInput').value.trim();
        if(!domain) return;
        const grid = document.getElementById('resultsGrid');
        grid.innerHTML = `<div class="loading">Auditing ${domain}...</div>`;
        currentResults = [];

        const [spfRecords, mxRecords, nsRecords, dmarcRecords] = await Promise.all([
            fetchDns(domain, 'TXT'),
            fetchDns(domain, 'MX'),
            fetchDns(domain, 'NS'),
            fetchDns(`_dmarc.${domain}`, 'TXT')
        ]);

        // Extended DKIM Selector List from your image
        const selectors = ['google', 'selector1', 'selector2', 'default', 'mail', 'dkim', 'k1', 'smtp', 'mimecast', 'proofpoint'];
        let foundDkim = [];
        
        // Scan selectors in parallel
        const dkimPromises = selectors.map(async s => {
            const res = await fetchDns(`${s}._domainkey.${domain}`, 'TXT');
            if (res.length > 0) return { selector: s, data: res[0].data };
            return null;
        });
        foundDkim = (await Promise.all(dkimPromises)).filter(x => x !== null);

        grid.innerHTML = "";

        renderCard("SPF Record", auditSPF(spfRecords));
        renderCard("DMARC Record", auditDMARC(dmarcRecords));
        renderCard("DKIM Records", auditDKIM(foundDkim));
        renderCard("MX Records", auditMX(mxRecords));
        renderCard("Nameservers", auditNS(nsRecords));

        document.getElementById('exportBtn').style.display = 'block';
    }

    function auditSPF(records) {
        const rec = records.find(r => r.data.includes("v=spf1"));
        if (!rec) return { status: "NOT FOUND", state: "failed", val: "No SPF record found." };
        const passed = rec.data.includes("~all") || rec.data.includes("-all");
        return { status: passed ? "FOUND - PASSED" : "FOUND - FAILED", state: passed ? "passed" : "failed", val: rec.data };
    }

    function auditDMARC(records) {
        const rec = records.find(r => r.data.includes("v=DMARC1"));
        if (!rec) return { status: "NOT FOUND", state: "failed", val: "No DMARC record found." };
        const passed = (rec.data.includes("p=quarantine") || rec.data.includes("p=reject"));
        return { status: passed ? "FOUND - PASSED" : "FOUND - FAILED", state: passed ? "passed" : "failed", val: rec.data };
    }

    function auditDKIM(found) {
        if (!found.length) return { status: "NOT FOUND", state: "failed", val: "Common selectors checked: none found." };
        return { status: "FOUND - PASSED", state: "passed", val: found.map(d => `[${d.selector}]: ${d.data}`).join(' | ') };
    }

    function auditMX(records) {
        if (!records.length) return { status: "NOT FOUND", state: "failed", val: "No MX records detected." };
        return { status: "FOUND - PASSED", state: "passed", val: records.map(r => r.data).join(' \n ') };
    }

    function auditNS(records) {
        // Handle nameservers specifically as they return data in trailing-dot format
        if (!records.length) return { status: "NOT FOUND", state: "failed", val: "No NS records detected." };
        return { status: "FOUND - PASSED", state: "passed", val: records.map(r => r.data.replace(/\.$/, '')).join(', ') };
    }

    function renderCard(title, result) {
        const grid = document.getElementById('resultsGrid');
        currentResults.push({ title, status: result.status, record: result.val });

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-status-bar ${result.state === 'passed' ? 'passed-bar' : 'failed-bar'}"></div>
            <div class="content">
                <strong>${title}</strong> <span class="badge badge-${result.state === 'passed' ? 'passed' : 'failed'}">${result.status}</span>
                <div class="record-val">
                    <span id="txt_${title.replace(/\s/g, '')}">${result.val}</span>
                    <span class="copy-link" onclick="copyText('txt_${title.replace(/\s/g, '')}')">COPY</span>
                </div>
            </div>
        `;
        grid.appendChild(card);
    }

    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        const original = document.querySelector(`[onclick="copyText('${id}')"]`);
        original.innerText = "COPIED!";
        setTimeout(() => original.innerText = "COPY", 2000);
    }

    function exportResults() {
        let csv = "Type,Status,Value\n";
        currentResults.forEach(r => csv += `"${r.title}","${r.status}","${r.record.replace(/"/g, '""')}"\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Audit_${document.getElementById('domainInput').value}.csv`;
        a.click();
    }
</script>
</body>
</html>
