<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling Tech | DNS Auditor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0b0e14; color: #e2e8f0; padding: 12px; line-height: 1.2; font-size: 13px; }
        
        :root {
            --green: #00ff66; --red: #ff3333; --blue: #38bdf8; --purple: #a855f7; --gold: #fbbf24;
            --card-bg: #161b22; --border: #30363d; --text-dim: #94a3b8;
        }

        .header-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        h1 { font-size: 1.2rem; color: #fff; display: flex; align-items: center; gap: 8px; font-weight: 800; }
        h1::before { content: ''; width: 3px; height: 16px; background: var(--blue); display: inline-block; }

        .util-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .bar { background: #1a1f29; border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; font-size: 0.8rem; }
        
        .blue-acc { border-left: 3px solid var(--blue); }
        .purp-acc { border-left: 3px solid var(--purple); }
        .gold-acc { border-left: 3px solid var(--gold); }

        .ip-val { color: var(--blue); font-weight: 800; font-family: monospace; cursor: pointer; }

        .gen-wrap { display: flex; flex-direction: column; gap: 4px; margin-top: 5px; }
        .gen-controls { display: flex; align-items: center; gap: 8px; }
        #hostnameResult { color: var(--gold); font-weight: 800; font-family: monospace; cursor: pointer; background: #0d1117; padding: 4px 8px; border-radius: 3px; font-size: 0.75rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .opt-label { font-size: 0.6rem; color: var(--text-dim); display: flex; align-items: center; gap: 3px; cursor: pointer; }

        .tenant-row { display: flex; gap: 5px; margin-top: 5px; }
        .tenant-input { background: #0d1117; border: 1px solid var(--border); border-radius: 3px; color: #fff; padding: 3px 6px; flex: 1; font-size: 0.7rem; outline: none; }

        .controls { display: flex; gap: 6px; margin-bottom: 12px; }
        input#domainInput { flex: 1; background: #0d1117; border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; color: #fff; outline: none; border-left: 3px solid var(--blue); font-weight: bold; }
        button { border: none; border-radius: 4px; padding: 6px 14px; font-weight: 700; cursor: pointer; font-size: 0.75rem; }
        #runBtn { background: var(--blue); color: #000; }
        #exportBtn { background: #21262d; color: #c9d1d9; border: 1px solid var(--border); display: none; }

        .status-container { display: none; grid-template-columns: 80px 1fr; gap: 10px; margin-bottom: 10px; align-items: center; }
        .score-circle { height: 60px; width: 60px; border-radius: 50%; border: 3px solid; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; background: rgba(0,0,0,0.3); }
        #masterStatus { padding: 10px; border-radius: 6px; font-weight: 800; font-size: 0.85rem; border: 1px solid; flex-grow: 1; }
        .master-pass { background: rgba(0, 255, 102, 0.05); color: var(--green); border-color: var(--green); }
        .master-fail { background: rgba(255, 51, 51, 0.05); color: var(--red); border-color: var(--red); }

        .results-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .small-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; border-left: 3px solid var(--blue); }
        .card.fail { border-left-color: var(--red); }
        .title { font-weight: 800; font-size: 0.7rem; text-transform: uppercase; color: #fff; margin-bottom: 4px; display: block; }
        
        /* Provider Badge */
        .provider-badge { font-size: 0.6rem; color: var(--blue); font-weight: 900; background: rgba(56, 189, 248, 0.1); padding: 2px 6px; border-radius: 4px; margin-bottom: 6px; display: inline-block; border: 1px solid var(--blue); }

        .record-box { background: #0d1117; border: 1px solid var(--border); padding: 6px 35px 6px 8px; border-radius: 4px; position: relative; font-family: monospace; font-size: 0.75rem; color: #7dd3fc; margin-top: 4px; word-break: break-all; min-height: 26px; display: flex; align-items: center; }
        .copy-btn { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); background: #21262d; border: 1px solid var(--border); color: #8b949e; padding: 2px 4px; font-size: 0.55rem; border-radius: 2px; cursor: pointer; }

        footer { text-align: center; margin-top: 20px; padding: 10px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase; }
    </style>
</head>
<body onload="getClientIP()">

    <div class="header-wrap">
        <h1>STERLING TECH AUDITOR</h1>
        <button id="exportBtn" onclick="exportToCSV()">EXPORT CSV</button>
    </div>

    <div class="util-grid">
        <div class="bar blue-acc">
            <span style="font-size:0.65rem; display:block; color:var(--text-dim)">LOCAL WAN IP</span>
            <span id="clientIP" class="ip-val" onclick="copyToClipboard(this.innerText, this)">Loading...</span>
        </div>

        <div class="bar gold-acc">
            <span style="font-size:0.65rem; display:block; color:var(--text-dim)">FQDN GENERATOR</span>
            <div class="gen-wrap">
                <div id="hostnameResult" onclick="copyToClipboard(this.innerText, this)">---</div>
                <div class="gen-controls">
                    <button onclick="generateName()" style="background:var(--gold); color:#000; padding:2px 8px; font-size:0.6rem;">GEN</button>
                    <label class="opt-label"><input type="checkbox" id="includeNum"> Add ID</label>
                </div>
            </div>
        </div>
    </div>

    <div class="bar purp-acc" style="margin-bottom:12px;">
        <span style="font-size:0.65rem; display:block; color:var(--text-dim)">MICROSOFT TENANT LOOKUP</span>
        <div class="tenant-row">
            <input type="text" id="tenantInput" class="tenant-input" placeholder="e.g. domain.onmicrosoft.com">
            <button onclick="lookupTenant()" style="background:var(--purple); color:#fff; padding:2px 8px; font-size:0.6rem;">FIND</button>
            <span id="tenantGuid" style="color:var(--purple); font-family:monospace; font-size:0.75rem; display:none; flex:1; text-align:right;" onclick="copyToClipboard(this.innerText, this)"></span>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="domainInput" placeholder="Enter target domain...">
        <button id="runBtn" onclick="runAudit()">ANALYZE</button>
    </div>

    <div id="loading" style="display:none; text-align:center; color:var(--blue); margin-bottom:10px; font-size:0.7rem;">Scanning Infrastructure...</div>

    <div class="status-container" id="statContainer">
        <div class="score-circle" id="scoreCircle">
            <span id="scoreVal" style="font-size:1.2rem">0</span>
        </div>
        <div id="masterStatus"></div>
    </div>
    
    <div class="results-grid" id="results"></div>

    <footer>&copy; 2026 Sterling Tech</footer>

<script>
    const themes = {
        gods: ["Zeus", "Hades", "Apollo", "Ares", "Poseidon", "Hermes", "Thor", "Odin", "Loki", "Freya", "Athena", "Atlas"],
        space: ["Jupiter", "Saturn", "Nebula", "Quasar", "Orion", "Titan", "Europa", "Nova", "Cosmos", "Zenith"],
        wild: ["Falcon", "Kodiak", "Raptor", "Viper", "Mammoth", "Orca", "Lynx", "Panther", "Cobra", "Phoenix"],
        film: ["Neo", "Morpheus", "Ripley", "Skywalker", "Kenobi", "Ghent", "Deckard", "Bane", "Vader"]
    };

    function detectMailProvider(mxRecords) {
        const text = mxRecords.join(' ').toLowerCase();
        if (text.includes('outlook.com')) return "MICROSOFT 365";
        if (text.includes('google.com') || text.includes('aspmx.l.google.com')) return "GOOGLE WORKSPACE";
        if (text.includes('pphosted.com')) return "PROOFPOINT";
        if (text.includes('mimecast.com')) return "MIMECAST";
        if (mxRecords.length > 0) return "PRIVATE / ON-PREM";
        return "NO MAIL SYSTEM DETECTED";
    }

    function generateName() {
        const all = [].concat(...Object.values(themes));
        let name = all[Math.floor(Math.random() * all.length)].toUpperCase();
        if (document.getElementById('includeNum').checked) {
            const num = Math.floor(Math.random() * 99) + 1;
            name += `-${num.toString().padStart(2, '0')}`;
        }
        const domainSuffix = document.getElementById('domainInput').value.trim().toLowerCase();
        document.getElementById('hostnameResult').innerText = domainSuffix ? `${name}.${domainSuffix}` : name;
    }

    async function lookupTenant() {
        const domain = document.getElementById('tenantInput').value.trim();
        const guidSpan = document.getElementById('tenantGuid');
        if (!domain) return;
        try {
            const res = await fetch(`https://login.microsoftonline.com/${domain}/.well-known/openid-configuration`);
            const data = await res.json();
            guidSpan.innerText = data.authorization_endpoint.split('/')[3];
            guidSpan.style.display = 'inline';
        } catch (e) { guidSpan.innerText = "NOT FOUND"; guidSpan.style.display = 'inline'; }
    }

    async function getClientIP() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            document.getElementById('clientIP').innerText = data.ip;
        } catch (e) { document.getElementById('clientIP').innerText = "0.0.0.0"; }
    }

    function copyToClipboard(text, btn) {
        const el = document.createElement('textarea');
        el.value = text; document.body.appendChild(el);
        el.select(); document.execCommand('copy');
        document.body.removeChild(el);
        const original = btn.innerText;
        btn.innerText = "COPIED";
        setTimeout(() => { btn.innerText = (btn.id === 'hostnameResult' || btn.id === 'clientIP') ? text : "COPY"; }, 1000);
    }

    async function fetchDNS(name, type) {
        const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(name)}&type=${type}`, { headers: { 'Accept': 'application/dns-json' } });
        return res.json();
    }

    async function runAudit() {
        const domain = document.getElementById('domainInput').value.trim().toLowerCase();
        if (!domain) return;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('results').innerHTML = '';
        document.getElementById('statContainer').style.display = 'none';
        let score = 0;

        try {
            const [spfData, dmarcData, mxData, nsData] = await Promise.all([fetchDNS(domain, 'TXT'), fetchDNS(`_dmarc.${domain}`, 'TXT'), fetchDNS(domain, 'MX'), fetchDNS(domain, 'NS')]);
            const selectors = ['google', 'selector1', 'default', 'mail', 'k1', 'ms', 'microsoft'];
            const dkimResults = await Promise.all(selectors.map(async s => {
                const data = await fetchDNS(`${s}._domainkey.${domain}`, 'TXT');
                const rec = data.Answer?.find(r => r.data.includes('v=DKIM1') || r.data.includes('p='));
                return rec ? { s, val: rec.data.replace(/"/g, '') } : null;
            }));
            const foundDkim = dkimResults.filter(x => x !== null);

            const spf = (spfData.Answer || []).find(r => r.data.includes('v=spf1'))?.data.replace(/"/g,'');
            if(spf) score += 35;
            const dmarc = (dmarcData.Answer || []).find(r => r.data.includes('v=DMARC1'))?.data.replace(/"/g,'');
            if(dmarc && !dmarc.includes('p=none')) score += 35;
            if(foundDkim.length > 0) score += 30;

            renderCard("SPF Record", !!spf, [spf]);
            renderCard("DMARC Record", (dmarc && !dmarc.includes('p=none')), [dmarc]);
            
            let dkimHtml = '';
            foundDkim.forEach(d => { dkimHtml += `<div style="font-size:0.6rem; color:var(--blue); margin-top:4px;">${d.s.toUpperCase()}</div>` + createBox(d.val); });
            renderCardRaw("DKIM Keys", foundDkim.length > 0, dkimHtml);

            // MX with Provider Detection
            const mxList = (mxData.Answer || []).map(r => r.data);
            const provider = detectMailProvider(mxList);
            const nsList = (nsData.Answer || []).map(r => r.data);

            const grid = document.getElementById('results');
            const row = document.createElement('div'); row.className = 'small-row';
            row.innerHTML = renderSmall("MX Records", mxList, provider) + renderSmall("Nameservers", nsList);
            grid.appendChild(row);

            document.getElementById('scoreVal').innerText = score;
            document.getElementById('scoreCircle').style.borderColor = score > 80 ? 'var(--green)' : 'var(--red)';
            document.getElementById('masterStatus').className = score > 80 ? 'master-pass' : 'master-fail';
            document.getElementById('masterStatus').innerHTML = score > 80 ? `STERLING AUDIT: PASS` : `STERLING AUDIT: FAIL`;
            document.getElementById('statContainer').style.display = 'grid';
            document.getElementById('exportBtn').style.display = 'block';
        } catch (e) { console.error(e); } finally { document.getElementById('loading').style.display = 'none'; }
    }

    function createBox(v) { return `<div class="record-box"><span>${v}</span><button class="copy-btn" onclick="copyToClipboard('${v.replace(/'/g, "\\'")}', this)">COPY</button></div>`; }
    function renderCardRaw(t, p, h) { document.getElementById('results').innerHTML += `<div class="card ${p?'':'fail'}"><span class="title">${t}</span>${h}</div>`; }
    function renderCard(t, p, rs) { let h = ''; rs.forEach(r => { if(r) h += createBox(r); }); renderCardRaw(t, p, h); }
    function renderSmall(t, rs, provider = null) { 
        let h = provider ? `<div class="provider-badge">${provider}</div>` : ''; 
        rs.forEach(r => { h += createBox(r); }); 
        return `<div class="card"><span class="title">${t}</span>${h}</div>`; 
    }
</script>
</body>
</html>
