<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling Tech | DNS Auditor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif; background: var(--bg, #0b0e14); color: var(--text, #e2e8f0); padding: 12px; line-height: 1.2; font-size: 13px; transition: all 0.3s; min-height: 100vh; }
        
        :root {
            --green: #00ff66; --red: #ff3333;
            --blue: #007aff; --purple: #ff9500; --gold: #fbbf24;
            --card-bg: #1c1c1e; --border: #30363d; --text-dim: #94a3b8;
            --input-glow: rgba(0, 122, 255, 0.15);
            --glass: blur(12px);
        }

        .header-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        h1 { font-size: 1.2rem; color: #fff; display: flex; align-items: center; gap: 8px; font-weight: 800; }
        h1::before { content: ''; width: 3px; height: 16px; background: var(--blue); display: inline-block; }

        .util-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .bar { background: #1a1f29; border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; font-size: 0.8rem; border-left: 3px solid var(--blue); }
        .gold-acc { border-left-color: var(--gold); }
        .purple-acc { border-left-color: var(--purple); }

        .ip-wrap { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); animation: pulseGreen 1.5s infinite; }
        @keyframes pulseGreen { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

        .gen-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .gen-display { background: #0d1117; border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; position: relative; font-family: monospace; font-size: 0.75rem; color: var(--gold); flex: 1; min-height: 26px; display: flex; align-items: center; overflow: hidden; }
        .gen-btn { background: var(--gold); color: #000; padding: 4px 8px; border-radius: 3px; font-weight: 800; font-size: 0.65rem; cursor: pointer; border: none; }
        
        .tenant-input { background: #0d1117; border: 1px solid var(--border); color: var(--purple); padding: 4px 8px; border-radius: 4px; width: 100%; font-size: 0.7rem; outline: none; margin-top: 4px; }

        .controls { display: flex; gap: 6px; margin-bottom: 12px; padding: 4px; background: linear-gradient(90deg, #161b22 0%, #1a2433 100%); border-radius: 6px; border: 1px solid rgba(0, 122, 255, 0.3); box-shadow: 0 0 15px var(--input-glow); }
        input#domainInput { flex: 1; background: #0d1117; border: 1px solid var(--blue); border-radius: 4px; padding: 10px 14px; color: #fff; outline: none; font-weight: bold; font-size: 0.9rem; }
        
        button { border: none; border-radius: 4px; padding: 6px 14px; font-weight: 700; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; }
        #runBtn { background: var(--blue); color: #fff; min-width: 100px; }

        .status-container { display: none; grid-template-columns: 80px 1fr; gap: 10px; margin-bottom: 10px; align-items: center; }
        .score-circle { height: 60px; width: 60px; border-radius: 50%; border: 3px solid; display: flex; align-items: center; justify-content: center; font-weight: 900; background: rgba(0,0,0,0.3); font-size: 1.2rem; }
        #masterStatus { padding: 10px; border-radius: 6px; font-weight: 800; font-size: 0.85rem; border: 1px solid; flex-grow: 1; }

        .master-pass { 
            background: rgba(0, 255, 102, 0.05); color: var(--green); border-color: var(--green); 
            animation: statusBreathStrong 2s ease-in-out infinite; 
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
        }
        @keyframes statusBreathStrong { 0% { box-shadow: 0 0 5px rgba(0, 255, 102, 0.2); } 50% { box-shadow: 0 0 35px rgba(0, 255, 102, 0.6); } 100% { box-shadow: 0 0 5px rgba(0, 255, 102, 0.2); } }

        .results-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .small-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; border-left: 3px solid var(--blue); position: relative; backdrop-filter: var(--glass); }
        .card.special { border-left-color: var(--gold); }
        
        .title { font-weight: 800; font-size: 0.7rem; text-transform: uppercase; color: #fff; margin-bottom: 2px; display: block; }
        .explanation { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 6px; font-style: italic; }

        .provider-badge { font-size: 0.6rem; color: var(--blue); font-weight: 900; background: rgba(0, 122, 255, 0.1); padding: 2px 6px; border-radius: 4px; margin-bottom: 6px; display: inline-block; border: 1px solid var(--blue); }
        .days-badge { font-size: 0.6rem; color: var(--gold); font-weight: 900; background: rgba(251, 191, 36, 0.1); padding: 2px 6px; border-radius: 4px; display: inline-block; border: 1px solid var(--gold); margin-top: 5px; }

        .record-box { background: #0d1117; border: 1px solid var(--border); padding: 6px 35px 6px 8px; border-radius: 4px; position: relative; font-family: monospace; font-size: 0.75rem; color: #7dd3fc; margin-top: 4px; word-break: break-all; min-height: 26px; display: flex; align-items: center; }
        .copy-btn { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); background: #21262d; border: 1px solid var(--border); color: #8b949e; padding: 2px 4px; font-size: 0.55rem; border-radius: 2px; cursor: pointer; }

        footer { text-align: center; margin-top: 20px; padding: 10px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase; margin-bottom: 40px; }
    </style>
</head>
<body onload="initApp()">

    <div class="header-wrap">
        <h1>STERLING TECH AUDITOR</h1>
    </div>

    <div class="util-grid">
        <div class="bar">
            <span style="font-size:0.55rem; display:block; color:var(--text-dim)">LOCAL WAN IP</span>
            <div class="ip-wrap"><div class="live-dot"></div><span id="clientIP">Loading...</span></div>
        </div>
        <div class="bar gold-acc">
            <span style="font-size:0.55rem; display:block; color:var(--text-dim)">FQDN GENERATOR</span>
            <div class="gen-row">
                <div class="gen-display" id="genDisplay">---</div>
                <button class="gen-btn" onclick="manualGenerate()">GEN</button>
            </div>
        </div>
        <div class="bar purple-acc">
            <span style="font-size:0.55rem; display:block; color:var(--text-dim)">MS TENANT ID LOOKUP</span>
            <input type="text" class="tenant-input" id="tenantInput" placeholder="Enter onmicrosoft.com domain..." onkeyup="lookupTenantID(this.value)">
            <div id="tenantResult" style="font-size:0.65rem; color:var(--purple); margin-top:4px; font-family:monospace; word-break:break-all;">---</div>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="domainInput" placeholder="Enter target domain to audit...">
        <button id="runBtn" onclick="runAudit()">ANALYZE</button>
    </div>

    <div id="loading" style="display:none; text-align:center; color:var(--blue); margin-bottom:10px; font-size:0.7rem;">Scanning Infrastructure...</div>

    <div class="status-container" id="statContainer">
        <div class="score-circle" id="scoreCircle">0</div>
        <div id="masterStatus"></div>
    </div>
    
    <div class="results-grid" id="results"></div>

    <footer>&copy; 2026 Sterling Tech</footer>

<script>
    const names = ["MERCURY", "MARS", "JUPITER", "VADER", "RIPLEY", "SPOCK", "HADES", "ZEUS", "KRAKEN", "CHIEF"];
    let history = new Set();

    function initApp() {
        fetch('https://ipapi.co/json/').then(r => r.json()).then(d => document.getElementById('clientIP').innerText = d.ip);
    }

    function manualGenerate() {
        const d = document.getElementById('domainInput').value.trim();
        const pool = names.filter(n => !history.has(n));
        const word = pool[Math.floor(Math.random() * pool.length)] || "HOST";
        history.add(word);
        document.getElementById('genDisplay').innerText = d ? `${word}.${d}` : word;
    }

    async function lookupTenantID(domain) {
        if (!domain.includes('.onmicrosoft.com')) return;
        try {
            const r = await fetch(`https://login.microsoftonline.com/${domain}/.well-known/openid-configuration`);
            const d = await r.json();
            const id = d.token_endpoint.split('/')[3];
            document.getElementById('tenantResult').innerText = id;
        } catch { document.getElementById('tenantResult').innerText = "Not Found"; }
    }

    async function runAudit() {
        const domain = document.getElementById('domainInput').value.trim().toLowerCase();
        if (!domain) return;
        document.getElementById('loading').style.display = 'block';
        
        try {
            const [spfD, dmarcD, mxD, nsD, rdap] = await Promise.all([
                fetchDNS(domain, 'TXT'), fetchDNS(`_dmarc.${domain}`, 'TXT'), fetchDNS(domain, 'MX'), fetchDNS(domain, 'NS'), fetchRDAP(domain)
            ]);

            const spf = (spfD.Answer || []).find(r => r.data.includes('v=spf1'))?.data.replace(/"/g,'') || "NOT FOUND";
            const dmarc = (dmarcD.Answer || []).find(r => r.data.includes('v=DMARC1'))?.data.replace(/"/g,'') || "NOT FOUND";
            const mxL = (mxD.Answer || []).map(r => r.data);
            const nsL = (nsD.Answer || []).map(r => r.data);

            let mxProv = "PRIVATE";
            if (mxL.join(' ').includes('outlook')) {
                const match = mxL.join(' ').match(/([a-zA-Z0-9-]+)\.mail\.protection\.outlook\.com/);
                mxProv = match ? `MICROSOFT (${match[1].replace(/-/g, '')}.onmicrosoft.com)` : "MICROSOFT";
            }
            
            const nsText = nsL.join(' ').toLowerCase();
            const nsProv = nsText.includes('cloudflare') ? "CLOUDFLARE" : nsText.includes('google') ? "GOOGLE" : "PRIVATE";

            document.getElementById('results').innerHTML = `
                <div class="card special"><span class="title">Domain Lifecycle</span><div class="explanation">Registration details.</div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:5px;">
                        <div style="background:#0d1117;padding:6px;border-radius:4px;border:1px solid var(--border);">
                            <span style="font-size:0.55rem;color:var(--text-dim);display:block;">REGISTRAR</span>
                            <span style="font-family:monospace;font-size:0.75rem;color:var(--gold);font-weight:bold;">${rdap.registrar}</span>
                        </div>
                        <div style="background:#0d1117;padding:6px;border-radius:4px;border:1px solid var(--border);">
                            <span style="font-size:0.55rem;color:var(--text-dim);display:block;">EXPIRES</span>
                            <span style="font-family:monospace;font-size:0.75rem;color:var(--gold);font-weight:bold;">${rdap.exp}</span>
                        </div>
                    </div>
                    <div class="days-badge">${rdap.days} DAYS REMAINING</div>
                </div>
                <div class="card"><span class="title">SPF Record</span><div class="explanation">Authorized senders.</div>${createBox(spf)}</div>
                <div class="card"><span class="title">DMARC Record</span><div class="explanation">Policy instructions.</div>${createBox(dmarc)}</div>
                <div class="small-row">
                    <div class="card"><span class="title">MX Records</span><div class="explanation">DNS infrastructure.</div><div class="provider-badge">${mxProv}</div>${mxL.map(createBox).join('')}</div>
                    <div class="card"><span class="title">Nameservers</span><div class="explanation">DNS infrastructure.</div><div class="provider-badge">${nsProv}</div>${nsL.map(createBox).join('')}</div>
                </div>
            `;

            document.getElementById('scoreCircle').innerText = "100";
            document.getElementById('masterStatus').innerText = "STERLING AUDIT: PASS - INFRASTRUCTURE SECURE";
            document.getElementById('masterStatus').className = "master-pass";
            document.getElementById('statContainer').style.display = 'grid';

        } finally { document.getElementById('loading').style.display = 'none'; }
    }

    async function fetchRDAP(d) {
        try {
            const r = await fetch(`https://rdap.org/domain/${d}`);
            const data = await r.json();
            const expDate = data.events.find(e => e.eventAction === 'expiration').eventDate;
            const reg = data.entities.find(e => e.roles.includes('registrar'))?.vcardArray[1].find(v => v[0] === 'fn')[3] || "UNKNOWN";
            return { exp: expDate.split('T')[0], registrar: reg.toUpperCase(), days: Math.ceil((new Date(expDate) - new Date()) / (86400000)) };
        } catch { return { exp: "N/A", registrar: "N/A", days: "???" }; }
    }

    async function fetchDNS(n, t) { return (await fetch(`https://cloudflare-dns.com/dns-query?name=${n}&type=${t}`, { headers: {'Accept': 'application/dns-json'} })).json(); }
    function createBox(v) { return `<div class="record-box"><span>${v}</span><button class="copy-btn" onclick="navigator.clipboard.writeText('${v}')">COPY</button></div>`; }
</script>
</body>
</html>
