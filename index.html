<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling Tech | DNS Auditor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'SF Pro Display', 'Segoe UI', system-ui, sans-serif; background: var(--bg, #0b0e14); color: var(--text, #e2e8f0); padding: 12px; line-height: 1.2; font-size: 13px; transition: all 0.3s; min-height: 100vh; }
        
        :root {
            --green: #00ff66; --red: #ff3333;
            --blue: #007aff; --purple: #ff9500; --gold: #fbbf24;
            --card-bg: #1c1c1e; --border: #30363d; --text-dim: #94a3b8;
            --input-glow: rgba(0, 122, 255, 0.15);
            --glass: blur(12px);
        }

        .header-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        h1 { font-size: 1.2rem; color: #fff; display: flex; align-items: center; gap: 8px; font-weight: 800; }
        h1::before { content: ''; width: 3px; height: 16px; background: var(--blue); display: inline-block; }

        .util-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .bar { background: #1a1f29; border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; font-size: 0.8rem; border-left: 3px solid var(--blue); }
        .gold-acc { border-left-color: var(--gold); }
        .purple-acc { border-left-color: var(--purple); }

        .ip-wrap { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); animation: pulseGreen 1.5s infinite; }
        @keyframes pulseGreen { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

        .gen-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .gen-display { background: #0d1117; border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; position: relative; font-family: monospace; font-size: 0.75rem; color: var(--gold); flex: 1; min-height: 26px; display: flex; align-items: center; overflow: hidden; }
        .gen-btn { background: var(--gold); color: #000; padding: 4px 8px; border-radius: 3px; font-weight: 800; font-size: 0.65rem; cursor: pointer; border: none; }
        
        .tenant-input { background: #0d1117; border: 1px solid var(--border); color: var(--purple); padding: 4px 8px; border-radius: 4px; width: 100%; font-size: 0.7rem; outline: none; margin-top: 4px; }

        .controls { display: flex; gap: 6px; margin-bottom: 12px; padding: 4px; background: linear-gradient(90deg, #161b22 0%, #1a2433 100%); border-radius: 6px; border: 1px solid rgba(0, 122, 255, 0.3); box-shadow: 0 0 15px var(--input-glow); }
        input#domainInput { flex: 1; background: #0d1117; border: 1px solid var(--blue); border-radius: 4px; padding: 10px 14px; color: #fff; outline: none; font-weight: bold; font-size: 0.9rem; }
        
        button { border: none; border-radius: 4px; padding: 6px 14px; font-weight: 700; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; }
        #runBtn { background: var(--blue); color: #fff; min-width: 100px; }

        .status-container { display: none; grid-template-columns: 80px 1fr; gap: 10px; margin-bottom: 10px; align-items: center; }
        .score-circle { height: 60px; width: 60px; border-radius: 50%; border: 3px solid; display: flex; align-items: center; justify-content: center; font-weight: 900; background: rgba(0,0,0,0.3); font-size: 1.2rem; }
        #masterStatus { padding: 10px; border-radius: 6px; font-weight: 800; font-size: 0.85rem; border: 1px solid; flex-grow: 1; }

        .master-pass { 
            background: rgba(0, 255, 102, 0.05); color: var(--green); border-color: var(--green); 
            animation: statusBreathStrong 2s ease-in-out infinite; 
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
        }
        @keyframes statusBreathStrong { 0% { box-shadow: 0 0 5px rgba(0, 255, 102, 0.2); } 50% { box-shadow: 0 0 35px rgba(0, 255, 102, 0.6); } 100% { box-shadow: 0 0 5px rgba(0, 255, 102, 0.2); } }

        .master-fail {
            background: rgba(255, 51, 51, 0.05); color: var(--red); border-color: var(--red);
            animation: statusBreathFail 2s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.3);
        }
        @keyframes statusBreathFail { 0% { box-shadow: 0 0 5px rgba(255, 51, 51, 0.2); } 50% { box-shadow: 0 0 35px rgba(255, 51, 51, 0.6); } 100% { box-shadow: 0 0 5px rgba(255, 51, 51, 0.2); } }

        .master-warn {
            background: rgba(251, 191, 36, 0.05); color: var(--gold); border-color: var(--gold);
            animation: statusBreathWarn 2s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }
        @keyframes statusBreathWarn { 0% { box-shadow: 0 0 5px rgba(251, 191, 36, 0.2); } 50% { box-shadow: 0 0 35px rgba(251, 191, 36, 0.6); } 100% { box-shadow: 0 0 5px rgba(251, 191, 36, 0.2); } }

        .results-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .small-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; border-left: 3px solid var(--blue); position: relative; backdrop-filter: var(--glass); }
        .card.special { border-left-color: var(--gold); }
        .card.card-pass { border-left-color: var(--green); }
        .card.card-fail { border-left-color: var(--red); }
        .card.card-warn { border-left-color: var(--gold); }
        
        .title { font-weight: 800; font-size: 0.7rem; text-transform: uppercase; color: #fff; margin-bottom: 2px; display: block; }
        .explanation { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 6px; font-style: italic; }

        .check-badge { font-size: 0.6rem; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-bottom: 6px; display: inline-block; border: 1px solid; }
        .badge-pass { color: var(--green); background: rgba(0, 255, 102, 0.1); border-color: var(--green); }
        .badge-fail { color: var(--red); background: rgba(255, 51, 51, 0.1); border-color: var(--red); }
        .badge-warn { color: var(--gold); background: rgba(251, 191, 36, 0.1); border-color: var(--gold); }

        .fail-reason { font-size: 0.65rem; color: var(--red); background: rgba(255, 51, 51, 0.08); border: 1px solid rgba(255, 51, 51, 0.3); border-radius: 4px; padding: 5px 8px; margin-top: 5px; }
        .warn-reason { font-size: 0.65rem; color: var(--gold); background: rgba(251, 191, 36, 0.08); border: 1px solid rgba(251, 191, 36, 0.3); border-radius: 4px; padding: 5px 8px; margin-top: 5px; }

        .fail-list { margin-bottom: 8px; }
        .fail-list-item { font-size: 0.7rem; color: var(--red); padding: 2px 0; }
        .fail-list-item::before { content: '✗ '; font-weight: bold; }

        .provider-badge { font-size: 0.6rem; color: var(--blue); font-weight: 900; background: rgba(0, 122, 255, 0.1); padding: 2px 6px; border-radius: 4px; margin-bottom: 6px; display: inline-block; border: 1px solid var(--blue); }
        .days-badge { font-size: 0.6rem; color: var(--gold); font-weight: 900; background: rgba(251, 191, 36, 0.1); padding: 2px 6px; border-radius: 4px; display: inline-block; border: 1px solid var(--gold); margin-top: 5px; }
        .days-badge-warn { font-size: 0.6rem; color: var(--red); font-weight: 900; background: rgba(255, 51, 51, 0.1); padding: 2px 6px; border-radius: 4px; display: inline-block; border: 1px solid var(--red); margin-top: 5px; }

        .record-box { background: #0d1117; border: 1px solid var(--border); padding: 6px 35px 6px 8px; border-radius: 4px; position: relative; font-family: monospace; font-size: 0.75rem; color: #7dd3fc; margin-top: 4px; word-break: break-all; min-height: 26px; display: flex; align-items: center; }
        .record-box.not-found { color: var(--red); border-color: rgba(255,51,51,0.4); background: rgba(255,51,51,0.05); }
        .copy-btn { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); background: #21262d; border: 1px solid var(--border); color: #8b949e; padding: 2px 4px; font-size: 0.55rem; border-radius: 2px; cursor: pointer; }

        /* ── SPEED TEST WIDGET ── */
        .speedtest-bar {
            background: #1a1f29;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 12px;
            border-left: 3px solid #00d4ff;
            position: relative;
            overflow: hidden;
        }
        .speedtest-bar::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0,212,255,0.03) 0%, transparent 60%);
            pointer-events: none;
        }
        .speedtest-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .speedtest-title {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .speedtest-title span {
            font-size: 0.55rem;
            color: var(--text-dim);
            font-weight: 400;
            text-transform: none;
        }
        #speedRunBtn {
            background: #00d4ff;
            color: #000;
            padding: 4px 12px;
            font-size: 0.65rem;
            font-weight: 900;
            border-radius: 3px;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }
        #speedRunBtn:disabled { opacity: 0.4; cursor: not-allowed; }

        .speedtest-metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .speed-metric {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 6px 8px;
            text-align: center;
            position: relative;
        }
        .speed-metric-label {
            font-size: 0.5rem;
            text-transform: uppercase;
            color: var(--text-dim);
            display: block;
            margin-bottom: 3px;
            letter-spacing: 0.05em;
        }
        .speed-metric-value {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 900;
            color: #00d4ff;
            display: block;
            line-height: 1;
        }
        .speed-metric-unit {
            font-size: 0.5rem;
            color: var(--text-dim);
            display: block;
            margin-top: 2px;
        }
        .speed-metric-value.val-good { color: var(--green); }
        .speed-metric-value.val-warn { color: var(--gold); }
        .speed-metric-value.val-bad  { color: var(--red); }

        /* animated scanner line during test */
        .speed-scanning .speedtest-bar::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; bottom: 0; width: 60%;
            background: linear-gradient(90deg, transparent, rgba(0,212,255,0.08), transparent);
            animation: scanLine 1.4s linear infinite;
        }
        @keyframes scanLine { to { left: 140%; } }

        .speedtest-verdict {
            margin-top: 8px;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            display: none;
            border: 1px solid;
        }
        .verdict-good { background: rgba(0,255,102,0.06); color: var(--green); border-color: var(--green); }
        .verdict-warn { background: rgba(251,191,36,0.06); color: var(--gold); border-color: var(--gold); }
        .verdict-bad  { background: rgba(255,51,51,0.06);  color: var(--red);  border-color: var(--red); }

        .speedtest-progress {
            height: 2px;
            background: var(--border);
            border-radius: 2px;
            margin-bottom: 8px;
            overflow: hidden;
            display: none;
        }
        .speedtest-progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #007aff, #00d4ff);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        footer { text-align: center; margin-top: 20px; padding: 10px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase; margin-bottom: 40px; }
    </style>
</head>
<body onload="initApp()">

    <div class="header-wrap">
        <h1>STERLING TECH AUDITOR</h1>
    </div>

    <div class="util-grid">
        <div class="bar">
            <span style="font-size:0.55rem; display:block; color:var(--text-dim)">LOCAL WAN IP</span>
            <div class="ip-wrap"><div class="live-dot"></div><span id="clientIP">Loading...</span></div>
        </div>
        <div class="bar gold-acc">
            <span style="font-size:0.55rem; display:block; color:var(--text-dim)">FQDN GENERATOR</span>
            <div class="gen-row">
                <div class="gen-display" id="genDisplay">---</div>
                <button class="gen-btn" onclick="manualGenerate()">GEN</button>
            </div>
        </div>
        <div class="bar purple-acc">
            <span style="font-size:0.55rem; display:block; color:var(--text-dim)">MS TENANT ID LOOKUP</span>
            <input type="text" class="tenant-input" id="tenantInput" placeholder="Enter onmicrosoft.com domain..." onkeyup="lookupTenantID(this.value)">
            <div id="tenantResult" style="font-size:0.65rem; color:var(--purple); margin-top:4px; font-family:monospace; word-break:break-all;">---</div>
        </div>
    </div>

    <!-- ── SPEED TEST WIDGET ── -->
    <div class="speedtest-bar" id="speedtestWidget">
        <div class="speedtest-header">
            <div class="speedtest-title">
                ◈ CONNECTION SPEED TEST
                <span>via Cloudflare — tests download, latency &amp; jitter from your location</span>
            </div>
            <button id="speedRunBtn" onclick="runSpeedTest()">RUN TEST</button>
        </div>
        <div class="speedtest-progress" id="speedProgress">
            <div class="speedtest-progress-fill" id="speedProgressFill"></div>
        </div>
        <div class="speedtest-metrics">
            <div class="speed-metric">
                <span class="speed-metric-label">Download</span>
                <span class="speed-metric-value" id="smDown">—</span>
                <span class="speed-metric-unit">Mbps</span>
            </div>
            <div class="speed-metric">
                <span class="speed-metric-label">Upload</span>
                <span class="speed-metric-value" id="smUp">—</span>
                <span class="speed-metric-unit">Mbps</span>
            </div>
            <div class="speed-metric">
                <span class="speed-metric-label">Latency</span>
                <span class="speed-metric-value" id="smLatency">—</span>
                <span class="speed-metric-unit">ms</span>
            </div>
            <div class="speed-metric">
                <span class="speed-metric-label">Jitter</span>
                <span class="speed-metric-value" id="smJitter">—</span>
                <span class="speed-metric-unit">ms</span>
            </div>
        </div>
        <div class="speedtest-verdict" id="speedVerdict"></div>
    </div>

    <div class="controls">
        <input type="text" id="domainInput" placeholder="Enter target domain to audit...">
        <button id="runBtn" onclick="runAudit()">ANALYZE</button>
    </div>

    <div id="loading" style="display:none; text-align:center; color:var(--blue); margin-bottom:10px; font-size:0.7rem;">Scanning Infrastructure...</div>

    <div class="status-container" id="statContainer">
        <div class="score-circle" id="scoreCircle">0</div>
        <div id="masterStatus"></div>
    </div>
    
    <div class="results-grid" id="results"></div>

    <footer>&copy; 2026 Sterling Tech</footer>

<script>
    const names = ["MERCURY", "MARS", "JUPITER", "VADER", "RIPLEY", "SPOCK", "HADES", "ZEUS", "KRAKEN", "CHIEF"];
    let history = new Set();
    const recordMap = {};

    function initApp() {
        fetch('https://ipapi.co/json/').then(r => r.json()).then(d => document.getElementById('clientIP').innerText = d.ip);
    }

    function manualGenerate() {
        const d = document.getElementById('domainInput').value.trim();
        const pool = names.filter(n => !history.has(n));
        const word = pool[Math.floor(Math.random() * pool.length)] || "HOST";
        history.add(word);
        document.getElementById('genDisplay').innerText = d ? `${word}.${d}` : word;
    }

    async function lookupTenantID(domain) {
        if (!domain.includes('.onmicrosoft.com')) return;
        try {
            const r = await fetch(`https://login.microsoftonline.com/${domain}/.well-known/openid-configuration`);
            const d = await r.json();
            const id = d.token_endpoint.split('/')[3];
            document.getElementById('tenantResult').innerText = id;
        } catch { document.getElementById('tenantResult').innerText = "Not Found"; }
    }

    // ─────────────────────────────────────────────
    //  SPEED TEST
    // ─────────────────────────────────────────────

    function setProgress(pct) {
        document.getElementById('speedProgressFill').style.width = pct + '%';
    }

    async function measureLatencyJitter(samples = 8) {
        const timings = [];
        const url = 'https://cloudflare-dns.com/dns-query?name=example.com&type=A';
        for (let i = 0; i < samples; i++) {
            const t0 = performance.now();
            try { await fetch(url, { cache: 'no-store', headers: { Accept: 'application/dns-json' } }); }
            catch(e) {}
            timings.push(performance.now() - t0);
            await new Promise(r => setTimeout(r, 80));
        }
        // drop worst outlier
        timings.sort((a, b) => a - b);
        const trimmed = timings.slice(0, samples - 1);
        const avg = trimmed.reduce((a, b) => a + b, 0) / trimmed.length;
        const diffs = [];
        for (let i = 1; i < trimmed.length; i++) diffs.push(Math.abs(trimmed[i] - trimmed[i-1]));
        const jitter = diffs.reduce((a, b) => a + b, 0) / diffs.length;
        return { latency: Math.round(avg), jitter: Math.round(jitter) };
    }

    async function measureDownload() {
        // fetch a ~10MB payload from Cloudflare's speed test endpoint
        const sizes = [
            { url: 'https://speed.cloudflare.com/__down?bytes=1000000',  bytes: 1000000 },
            { url: 'https://speed.cloudflare.com/__down?bytes=5000000',  bytes: 5000000 },
            { url: 'https://speed.cloudflare.com/__down?bytes=10000000', bytes: 10000000 },
        ];
        let totalBytes = 0, totalMs = 0;
        for (const { url, bytes } of sizes) {
            try {
                const t0 = performance.now();
                const r = await fetch(url, { cache: 'no-store' });
                await r.arrayBuffer();
                const ms = performance.now() - t0;
                totalBytes += bytes;
                totalMs += ms;
            } catch(e) {}
        }
        if (totalMs === 0) return null;
        return (totalBytes * 8) / (totalMs / 1000) / 1_000_000; // Mbps
    }

    async function measureUpload() {
        const sizes = [
            { bytes: 500000 },
            { bytes: 2000000 },
        ];
        let totalBytes = 0, totalMs = 0;
        for (const { bytes } of sizes) {
            try {
                const payload = new Uint8Array(bytes);
                const t0 = performance.now();
                await fetch('https://speed.cloudflare.com/__up', {
                    method: 'POST',
                    body: payload,
                    cache: 'no-store'
                });
                const ms = performance.now() - t0;
                totalBytes += bytes;
                totalMs += ms;
            } catch(e) {}
        }
        if (totalMs === 0) return null;
        return (totalBytes * 8) / (totalMs / 1000) / 1_000_000;
    }

    function colorVal(el, val, goodBelow, warnBelow, higherIsBetter = false) {
        el.className = 'speed-metric-value';
        if (val === null || isNaN(val)) { el.classList.add('val-warn'); return; }
        if (higherIsBetter) {
            if (val >= goodBelow) el.classList.add('val-good');
            else if (val >= warnBelow) el.classList.add('val-warn');
            else el.classList.add('val-bad');
        } else {
            if (val <= goodBelow) el.classList.add('val-good');
            else if (val <= warnBelow) el.classList.add('val-warn');
            else el.classList.add('val-bad');
        }
    }

    function buildVerdict(dl, ul, latency, jitter) {
        const el = document.getElementById('speedVerdict');
        el.style.display = 'block';

        const issues = [];
        const notes  = [];

        // Download
        if (dl === null) { issues.push("Download speed could not be measured."); }
        else if (dl < 5)  { issues.push(`Download is very slow (${dl.toFixed(1)} Mbps) — unsuitable for remote working or video calls.`); }
        else if (dl < 25) { notes.push(`Download of ${dl.toFixed(1)} Mbps is adequate but may struggle with multiple concurrent users or large file transfers.`); }

        // Upload
        if (ul === null) { issues.push("Upload speed could not be measured."); }
        else if (ul < 2)  { issues.push(`Upload is very low (${ul.toFixed(1)} Mbps) — video conferencing and cloud backups will be impaired.`); }
        else if (ul < 10) { notes.push(`Upload of ${ul.toFixed(1)} Mbps is acceptable for light use but may bottleneck cloud sync or Teams calls.`); }

        // Latency
        if (latency > 150) { issues.push(`High latency (${latency} ms) — expect noticeable lag on VoIP, RDP, and interactive applications.`); }
        else if (latency > 80) { notes.push(`Latency of ${latency} ms is moderate — adequate for most uses but not ideal for RDP/VoIP.`); }

        // Jitter
        if (jitter > 30) { issues.push(`High jitter (${jitter} ms) — unstable connection that will cause audio/video stuttering on calls.`); }
        else if (jitter > 15) { notes.push(`Jitter of ${jitter} ms is slightly elevated — call quality may occasionally degrade.`); }

        if (issues.length > 0) {
            el.className = 'speedtest-verdict verdict-bad';
            el.innerHTML = '⚠ CONNECTION ISSUES DETECTED — ' + issues.join(' ') + (notes.length ? ' ' + notes.join(' ') : '');
        } else if (notes.length > 0) {
            el.className = 'speedtest-verdict verdict-warn';
            el.innerHTML = '⚠ CONNECTION ACCEPTABLE — ' + notes.join(' ');
        } else {
            el.className = 'speedtest-verdict verdict-good';
            el.innerHTML = `✓ CONNECTION HEALTHY — Download ${dl ? dl.toFixed(0) : '?'} Mbps · Upload ${ul ? ul.toFixed(0) : '?'} Mbps · Latency ${latency} ms · Jitter ${jitter} ms. Suitable for remote work, VoIP, RDP, and cloud services.`;
        }
    }

    async function runSpeedTest() {
        const btn = document.getElementById('speedRunBtn');
        btn.disabled = true;
        btn.innerText = 'TESTING…';
        document.getElementById('speedVerdict').style.display = 'none';

        const prog = document.getElementById('speedProgress');
        prog.style.display = 'block';
        setProgress(0);

        // reset metric displays
        ['smDown','smUp','smLatency','smJitter'].forEach(id => {
            const el = document.getElementById(id);
            el.innerText = '…';
            el.className = 'speed-metric-value';
        });

        document.getElementById('speedtestWidget').classList.add('speed-scanning');

        try {
            // Phase 1: Latency + Jitter
            btn.innerText = 'PINGING…';
            setProgress(10);
            const { latency, jitter } = await measureLatencyJitter(10);
            setProgress(30);

            const latEl = document.getElementById('smLatency');
            latEl.innerText = latency;
            colorVal(latEl, latency, 50, 100, false);

            const jitEl = document.getElementById('smJitter');
            jitEl.innerText = jitter;
            colorVal(jitEl, jitter, 10, 30, false);

            // Phase 2: Download
            btn.innerText = 'DOWNLOADING…';
            setProgress(35);
            const dl = await measureDownload();
            setProgress(75);

            const dlEl = document.getElementById('smDown');
            dlEl.innerText = dl !== null ? dl.toFixed(1) : 'ERR';
            colorVal(dlEl, dl, 50, 10, true);

            // Phase 3: Upload
            btn.innerText = 'UPLOADING…';
            setProgress(80);
            const ul = await measureUpload();
            setProgress(100);

            const ulEl = document.getElementById('smUp');
            ulEl.innerText = ul !== null ? ul.toFixed(1) : 'ERR';
            colorVal(ulEl, ul, 20, 5, true);

            buildVerdict(dl, ul, latency, jitter);

        } catch(e) {
            document.getElementById('speedVerdict').style.display = 'block';
            document.getElementById('speedVerdict').className = 'speedtest-verdict verdict-bad';
            document.getElementById('speedVerdict').innerText = '✗ Speed test failed — check network connectivity.';
        }

        document.getElementById('speedtestWidget').classList.remove('speed-scanning');
        setTimeout(() => { prog.style.display = 'none'; setProgress(0); }, 600);
        btn.disabled = false;
        btn.innerText = 'RE-RUN';
    }

    // ─────────────────────────────────────────────
    //  DNS AUDIT (unchanged)
    // ─────────────────────────────────────────────

    function evaluateSPF(spf) {
        if (spf === "NOT FOUND") return { pass: false, level: 'fail', reason: "No SPF record found. Unauthenticated senders can spoof this domain." };
        if (!spf.startsWith('v=spf1')) return { pass: false, level: 'fail', reason: "SPF record malformed — must begin with v=spf1." };
        if (spf.includes('+all')) return { pass: false, level: 'fail', reason: "SPF uses '+all' — allows ANY server to send mail. This is a critical misconfiguration." };
        if (spf.includes('?all')) return { pass: false, level: 'warn', reason: "SPF uses '?all' (neutral) — does not actively block unauthorised senders. Recommended: use '~all' or '-all'." };
        if (!spf.includes('~all') && !spf.includes('-all')) return { pass: false, level: 'warn', reason: "SPF record has no 'all' mechanism. Add '~all' (softfail) or '-all' (hardfail) to restrict senders." };
        if (spf.includes('~all')) return { pass: true, level: 'warn', reason: "SPF uses '~all' (softfail). Consider upgrading to '-all' for stricter enforcement." };
        return { pass: true, level: 'pass', reason: null };
    }

    function evaluateDMARC(dmarc) {
        if (dmarc === "NOT FOUND") return { pass: false, level: 'fail', reason: "No DMARC record found. Without DMARC, spoofed emails may reach inboxes with no reporting." };
        if (!dmarc.includes('v=DMARC1')) return { pass: false, level: 'fail', reason: "DMARC record malformed — must begin with v=DMARC1." };
        const pMatch = dmarc.match(/p=([a-z]+)/i);
        const policy = pMatch ? pMatch[1].toLowerCase() : null;
        if (!policy) return { pass: false, level: 'fail', reason: "DMARC record is missing the required 'p=' policy tag." };
        if (policy === 'none') return { pass: false, level: 'warn', reason: "DMARC policy is 'p=none' — monitoring only, no enforcement. Spoofed emails are not blocked. Upgrade to 'p=quarantine' or 'p=reject'." };
        if (policy === 'quarantine') return { pass: true, level: 'warn', reason: "DMARC policy is 'p=quarantine'. Spoofed mail goes to spam. For full protection, consider upgrading to 'p=reject'." };
        if (policy === 'reject') return { pass: true, level: 'pass', reason: null };
        return { pass: false, level: 'warn', reason: `Unknown DMARC policy value: '${policy}'.` };
    }

    function evaluateDKIM(dkim) {
        if (dkim === "NOT FOUND") return { pass: false, level: 'fail', reason: "No DKIM record found for 'selector1'. Emails cannot be cryptographically signed, making them easier to spoof or tamper with." };
        if (!dkim.includes('v=DKIM1')) return { pass: false, level: 'fail', reason: "DKIM record malformed — must include v=DKIM1." };
        if (!dkim.includes('p=') || dkim.includes('p=;') || dkim.includes('p= ')) return { pass: false, level: 'fail', reason: "DKIM record has an empty or revoked public key ('p='). The key has been revoked and email signing is broken." };
        return { pass: true, level: 'pass', reason: null };
    }

    function evaluateMX(mxList) {
        if (!mxList.length) return { pass: false, level: 'fail', reason: "No MX records found. This domain cannot receive email." };
        return { pass: true, level: 'pass', reason: null };
    }

    function evaluateExpiry(days) {
        const n = parseInt(days);
        if (isNaN(n)) return { level: 'pass', reason: null };
        if (n <= 0) return { level: 'fail', reason: "Domain has expired!" };
        if (n <= 30) return { level: 'fail', reason: `Domain expires in ${n} days — renew immediately.` };
        if (n <= 60) return { level: 'warn', reason: `Domain expires in ${n} days — renewal advised soon.` };
        return { level: 'pass', reason: null };
    }

    function badgeHTML(level) {
        if (level === 'pass') return `<span class="check-badge badge-pass">✓ PASS</span>`;
        if (level === 'fail') return `<span class="check-badge badge-fail">✗ FAIL</span>`;
        return `<span class="check-badge badge-warn">⚠ WARNING</span>`;
    }

    function reasonHTML(check) {
        if (!check.reason) return '';
        if (check.level === 'fail') return `<div class="fail-reason">⚠ ${check.reason}</div>`;
        if (check.level === 'warn') return `<div class="warn-reason">⚠ ${check.reason}</div>`;
        return '';
    }

    function cardClass(level) {
        if (level === 'pass') return 'card card-pass';
        if (level === 'fail') return 'card card-fail';
        return 'card card-warn';
    }

    function createBox(v) {
        const missing = (v === "NOT FOUND");
        const id = 'rec-' + Math.random().toString(36).substr(2, 9);
        if (!missing) recordMap[id] = v;
        return `<div class="record-box${missing ? ' not-found' : ''}" id="${id}"><span>${v}</span>${!missing ? `<button class="copy-btn" onclick="copyRecord('${id}', this)">COPY</button>` : ''}</div>`;
    }

    function copyRecord(id, btn) {
        const text = recordMap[id];
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
            btn.innerText = 'COPIED';
            setTimeout(() => btn.innerText = 'COPY', 1500);
        }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            btn.innerText = 'COPIED';
            setTimeout(() => btn.innerText = 'COPY', 1500);
        });
    }

    async function runAudit() {
        const domain = document.getElementById('domainInput').value.trim().toLowerCase();
        if (!domain) return;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('statContainer').style.display = 'none';
        document.getElementById('results').innerHTML = '';

        try {
            const [spfD, dmarcD, dkimD, mxD, nsD, rdap] = await Promise.all([
                fetchDNS(domain, 'TXT'), fetchDNS(`_dmarc.${domain}`, 'TXT'), fetchDNS(`selector1._domainkey.${domain}`, 'TXT'), fetchDNS(domain, 'MX'), fetchDNS(domain, 'NS'), fetchRDAP(domain)
            ]);

            const spf   = (spfD.Answer || []).find(r => r.data.includes('v=spf1'))?.data.replace(/"/g,'') || "NOT FOUND";
            const dmarc = (dmarcD.Answer || []).find(r => r.data.includes('v=DMARC1'))?.data.replace(/"/g,'') || "NOT FOUND";
            const dkim  = (dkimD.Answer || []).find(r => r.data.includes('v=DKIM1'))?.data.replace(/"/g,'') || "NOT FOUND";
            const mxL   = (mxD.Answer || []).map(r => r.data);
            const nsL   = (nsD.Answer || []).map(r => r.data);

            const spfCheck    = evaluateSPF(spf);
            const dmarcCheck  = evaluateDMARC(dmarc);
            const dkimCheck   = evaluateDKIM(dkim);
            const mxCheck     = evaluateMX(mxL);
            const expiryCheck = evaluateExpiry(rdap.days);

            const checks = [spfCheck, dmarcCheck, dkimCheck, mxCheck];
            const passCount = checks.filter(c => c.pass).length;
            const score = Math.round((passCount / checks.length) * 100);
            const hasFailures = checks.some(c => c.level === 'fail') || expiryCheck.level === 'fail';
            const hasWarnings = checks.some(c => c.level === 'warn') || expiryCheck.level === 'warn';

            const failures = [];
            if (!spfCheck.pass) failures.push(`SPF: ${spfCheck.reason}`);
            if (!dmarcCheck.pass) failures.push(`DMARC: ${dmarcCheck.reason}`);
            if (!dkimCheck.pass) failures.push(`DKIM: ${dkimCheck.reason}`);
            if (!mxCheck.pass) failures.push(`MX: ${mxCheck.reason}`);
            if (expiryCheck.level !== 'pass') failures.push(`EXPIRY: ${expiryCheck.reason}`);

            const scoreEl = document.getElementById('scoreCircle');
            const statusEl = document.getElementById('masterStatus');
            scoreEl.innerText = score;

            if (hasFailures) {
                scoreEl.style.borderColor = 'var(--red)';
                scoreEl.style.color = 'var(--red)';
                statusEl.className = 'master-fail';
                const failItems = failures.map(f => `<div class="fail-list-item">${f}</div>`).join('');
                statusEl.innerHTML = `STERLING AUDIT: FAIL — ${passCount}/${checks.length} CHECKS PASSED<div class="fail-list" style="margin-top:6px;">${failItems}</div>`;
            } else if (hasWarnings) {
                scoreEl.style.borderColor = 'var(--gold)';
                scoreEl.style.color = 'var(--gold)';
                statusEl.className = 'master-warn';
                const warnItems = failures.map(f => `<div class="fail-list-item" style="color:var(--gold);">⚠ ${f}</div>`).join('');
                statusEl.innerHTML = `STERLING AUDIT: WARNING — ISSUES REQUIRE ATTENTION<div class="fail-list" style="margin-top:6px;">${warnItems}</div>`;
            } else {
                scoreEl.style.borderColor = 'var(--green)';
                scoreEl.style.color = 'var(--green)';
                statusEl.className = 'master-pass';
                statusEl.innerHTML = `STERLING AUDIT: PASS — ALL CHECKS CLEARED. INFRASTRUCTURE SECURE.`;
            }

            document.getElementById('statContainer').style.display = 'grid';

            let mxProv = mxL.length ? "PRIVATE" : "NONE";
            if (mxL.join(' ').includes('outlook')) {
                const match = mxL.join(' ').match(/([a-zA-Z0-9-]+)\.mail\.protection\.outlook\.com/);
                mxProv = match ? `MICROSOFT (${match[1].replace(/-/g, '')}.onmicrosoft.com)` : "MICROSOFT";
            } else if (mxL.join(' ').includes('google')) {
                mxProv = "GOOGLE WORKSPACE";
            }

            const nsText = nsL.join(' ').toLowerCase();
            const nsProv = nsText.includes('cloudflare') ? "CLOUDFLARE" : nsText.includes('google') ? "GOOGLE" : "PRIVATE";

            const daysBadge = expiryCheck.level === 'fail'
                ? `<div class="days-badge-warn">⚠ ${rdap.days} DAYS REMAINING</div>`
                : expiryCheck.level === 'warn'
                    ? `<div class="days-badge-warn">${rdap.days} DAYS REMAINING</div>`
                    : `<div class="days-badge">${rdap.days} DAYS REMAINING</div>`;

            document.getElementById('results').innerHTML = `
                <div class="${cardClass(expiryCheck.level)} special">
                    <span class="title">Domain Lifecycle</span>
                    <div class="explanation">Registration details.</div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:5px;">
                        <div style="background:#0d1117;padding:6px;border-radius:4px;border:1px solid var(--border);">
                            <span style="font-size:0.55rem;color:var(--text-dim);display:block;">REGISTRAR</span>
                            <span style="font-family:monospace;font-size:0.75rem;color:var(--gold);font-weight:bold;">${rdap.registrar}</span>
                        </div>
                        <div style="background:#0d1117;padding:6px;border-radius:4px;border:1px solid var(--border);">
                            <span style="font-size:0.55rem;color:var(--text-dim);display:block;">EXPIRES</span>
                            <span style="font-family:monospace;font-size:0.75rem;color:var(--gold);font-weight:bold;">${rdap.exp}</span>
                        </div>
                    </div>
                    ${daysBadge}
                    ${reasonHTML(expiryCheck)}
                </div>
                <div class="${cardClass(spfCheck.level)}">
                    <span class="title">SPF Record</span>
                    <div class="explanation">Authorized senders — controls which servers can send mail for this domain.</div>
                    ${badgeHTML(spfCheck.level)}
                    ${createBox(spf)}
                    ${reasonHTML(spfCheck)}
                </div>
                <div class="${cardClass(dmarcCheck.level)}">
                    <span class="title">DMARC Record</span>
                    <div class="explanation">Policy instructions — defines what to do with emails that fail SPF/DKIM checks.</div>
                    ${badgeHTML(dmarcCheck.level)}
                    ${createBox(dmarc)}
                    ${reasonHTML(dmarcCheck)}
                </div>
                <div class="${cardClass(dkimCheck.level)}">
                    <span class="title">DKIM Record</span>
                    <div class="explanation">Signature verification — cryptographic proof that emails haven't been tampered with.</div>
                    ${badgeHTML(dkimCheck.level)}
                    ${createBox(dkim)}
                    ${reasonHTML(dkimCheck)}
                </div>
                <div class="small-row">
                    <div class="${cardClass(mxCheck.level)}">
                        <span class="title">MX Records</span>
                        <div class="explanation">Mail exchange servers.</div>
                        ${badgeHTML(mxCheck.level)}
                        <div class="provider-badge">${mxProv}</div>
                        ${mxL.length ? mxL.map(createBox).join('') : createBox("NOT FOUND")}
                        ${reasonHTML(mxCheck)}
                    </div>
                    <div class="card">
                        <span class="title">Nameservers</span>
                        <div class="explanation">DNS infrastructure.</div>
                        <div class="provider-badge">${nsProv}</div>
                        ${nsL.length ? nsL.map(createBox).join('') : createBox("NOT FOUND")}
                    </div>
                </div>
            `;

        } finally { document.getElementById('loading').style.display = 'none'; }
    }

    async function fetchRDAP(d) {
        try {
            const r = await fetch(`https://rdap.org/domain/${d}`);
            const data = await r.json();
            const expDate = data.events.find(e => e.eventAction === 'expiration').eventDate;
            const reg = data.entities.find(e => e.roles.includes('registrar'))?.vcardArray[1].find(v => v[0] === 'fn')[3] || "UNKNOWN";
            const [y,m,day] = expDate.split('T')[0].split('-');
            return { exp: `${day}-${m}-${y}`, registrar: reg.toUpperCase(), days: Math.ceil((new Date(expDate) - new Date()) / (86400000)) };
        } catch { return { exp: "N/A", registrar: "N/A", days: "???" }; }
    }

    async function fetchDNS(n, t) { return (await fetch(`https://cloudflare-dns.com/dns-query?name=${n}&type=${t}`, { headers: {'Accept': 'application/dns-json'} })).json(); }
</script>
