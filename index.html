<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling DNS Auditor | Jackson Tech</title>
    <style>
        :root {
            --bg-body: #06090f;
            --bg-card: #0d1117;
            --bg-input: #161b22;
            --text-main: #c9d1d9;
            --accent: #238636; /* Success Green */
            --danger: #da3633; /* Red */
            --warning: #d29922; /* Gold */
            --border: #30363d;
        }

        body { background: var(--bg-body); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-area { display: flex; gap: 10px; background: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 30px; }
        
        input { flex-grow: 1; background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 6px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .export-btn { background: #21262d; border: 1px solid var(--border); margin-left: 10px; }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; position: relative; overflow: hidden; }
        .card-status-bar { height: 4px; width: 100%; position: absolute; top: 0; left: 0; }
        .content { padding: 20px; }

        .badge { font-size: 11px; padding: 2px 8px; border-radius: 12px; font-weight: bold; margin-left: 10px; text-transform: uppercase; }
        .badge-passed { background: rgba(35, 134, 54, 0.2); color: #3fb950; border: 1px solid var(--accent); }
        .badge-failed { background: rgba(218, 54, 51, 0.2); color: #f85149; border: 1px solid var(--danger); }
        .badge-missing { background: rgba(248, 81, 73, 0.1); color: #f85149; border: 1px dashed var(--danger); }

        .record-val { background: #010409; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 13px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #161b22; }
        .copy-link { color: #58a6ff; font-size: 11px; cursor: pointer; text-decoration: none; }
        .copy-link:hover { text-decoration: underline; }

        .passed-bar { background: var(--accent); }
        .failed-bar { background: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h1>Sterling DNS Auditor</h1>
        <button class="export-btn" id="exportBtn" style="display:none;" onclick="exportResults()">Export CSV</button>
    </div>

    <div class="search-area">
        <input type="text" id="domainInput" placeholder="Enter domain (e.g. jacksontech.co.uk)">
        <button onclick="runAudit()">Audit Domain</button>
    </div>

    <div id="resultsGrid"></div>
</div>

<script>
    let currentResults = [];

    async function fetchDns(domain, type) {
        const r = await fetch(`https://dns.google/resolve?name=${domain}&type=${type}`);
        const d = await r.json();
        return d.Answer || [];
    }

    async function runAudit() {
        const domain = document.getElementById('domainInput').value.trim();
        if(!domain) return;
        const grid = document.getElementById('resultsGrid');
        grid.innerHTML = "Auditing infrastructure...";
        currentResults = [];

        const data = {
            spf: await fetchDns(domain, 'TXT'),
            dmarc: await fetchDns(`_dmarc.${domain}`, 'TXT'),
            mx: await fetchDns(domain, 'MX'),
            ns: await fetchDns(domain, 'NS')
        };

        renderCard("SPF Record", auditSPF(data.spf));
        renderCard("DMARC Record", auditDMARC(data.dmarc));
        renderCard("MX Records", auditMX(data.mx));
        renderCard("Nameservers", auditNS(data.ns));

        document.getElementById('exportBtn').style.display = 'block';
    }

    function auditSPF(records) {
        const rec = records.find(r => r.data.includes("v=spf1"));
        if (!rec) return { status: "NOT FOUND", state: "missing", val: "No SPF record found." };
        const passed = rec.data.includes("-all") || rec.data.includes("~all");
        return { status: passed ? "FOUND - PASSED" : "FOUND - FAILED", state: passed ? "passed" : "failed", val: rec.data };
    }

    function auditDMARC(records) {
        const rec = records.find(r => r.data.includes("v=DMARC1"));
        if (!rec) return { status: "NOT FOUND", state: "missing", val: "No DMARC record found." };
        const passed = rec.data.includes("p=reject") || rec.data.includes("p=quarantine");
        return { status: passed ? "FOUND - PASSED" : "FOUND - FAILED", state: passed ? "passed" : "failed", val: rec.data };
    }

    function auditMX(records) {
        if (!records.length) return { status: "NOT FOUND", state: "missing", val: "No MX records." };
        return { status: "FOUND - PASSED", state: "passed", val: records.map(r => r.data).join(', ') };
    }

    function auditNS(records) {
        if (!records.length) return { status: "NOT FOUND", state: "missing", val: "No Nameservers detected." };
        return { status: "FOUND - PASSED", state: "passed", val: records.map(r => r.data).join(', ') };
    }

    function renderCard(title, result) {
        const grid = document.getElementById('resultsGrid');
        if(grid.innerHTML === "Auditing infrastructure...") grid.innerHTML = "";
        
        currentResults.push({ title, status: result.status, record: result.val });

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-status-bar ${result.state === 'passed' ? 'passed-bar' : 'failed-bar'}"></div>
            <div class="content">
                <strong>${title}</strong> <span class="badge badge-${result.state}">${result.status}</span>
                <div class="record-val">
                    <span id="txt_${title}">${result.val}</span>
                    <span class="copy-link" onclick="copyText('txt_${title}')">COPY</span>
                </div>
            </div>
        `;
        grid.appendChild(card);
    }

    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        alert("Copied to clipboard!");
    }

    function exportResults() {
        let csv = "Record Type,Status,Value\n";
        currentResults.forEach(r => {
            csv += `"${r.title}","${r.status}","${r.record.replace(/"/g, '""')}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'dns-audit.csv');
        a.click();
    }
</script>
</body>
</html>
