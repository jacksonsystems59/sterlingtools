<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling Tech | DNS Auditor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0b0e14; color: #e2e8f0; padding: 12px; line-height: 1.2; font-size: 13px; }
        
        :root {
            --green: #00ff66; --red: #ff3333; --blue: #38bdf8; --purple: #a855f7; --gold: #fbbf24;
            --card-bg: #161b22; --border: #30363d; --text-dim: #94a3b8;
            --input-glow: rgba(56, 189, 248, 0.15);
        }

        .header-wrap { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        h1 { font-size: 1.2rem; color: #fff; display: flex; align-items: center; gap: 8px; font-weight: 800; }
        h1::before { content: ''; width: 3px; height: 16px; background: var(--blue); display: inline-block; }

        .util-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 10px; margin-bottom: 12px; }
        .bar { background: #1a1f29; border: 1px solid var(--border); border-radius: 4px; padding: 8px 12px; font-size: 0.8rem; border-left: 3px solid var(--blue); }
        .gold-acc { border-left-color: var(--gold); }

        /* FQDN GENERATOR STYLES */
        .gen-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .gen-display { background: #0d1117; border: 1px solid var(--border); padding: 4px 35px 4px 8px; border-radius: 4px; position: relative; font-family: monospace; font-size: 0.75rem; color: var(--gold); flex: 1; min-height: 26px; display: flex; align-items: center; white-space: nowrap; overflow: hidden; }
        .gen-btn { background: var(--gold); color: #000; padding: 4px 8px; border-radius: 3px; font-weight: 800; font-size: 0.65rem; cursor: pointer; border: none; }

        .controls { display: flex; gap: 6px; margin-bottom: 12px; padding: 4px; background: linear-gradient(90deg, #161b22 0%, #1a2433 100%); border-radius: 6px; border: 1px solid #38bdf844; box-shadow: 0 0 15px var(--input-glow); }
        input#domainInput { flex: 1; background: #0d1117; border: 1px solid var(--blue); border-radius: 4px; padding: 10px 14px; color: #fff; outline: none; font-weight: bold; font-size: 0.9rem; }
        
        button { border: none; border-radius: 4px; padding: 6px 14px; font-weight: 700; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; }
        #runBtn { background: var(--blue); color: #000; min-width: 100px; }
        #exportBtn { background: #21262d; color: #c9d1d9; border: 1px solid var(--border); display: none; }

        .status-container { display: none; grid-template-columns: 80px 1fr; gap: 10px; margin-bottom: 10px; align-items: center; }
        .score-circle { height: 60px; width: 60px; border-radius: 50%; border: 3px solid; display: flex; align-items: center; justify-content: center; font-weight: 900; background: rgba(0,0,0,0.3); font-size: 1.2rem; }
        #masterStatus { padding: 10px; border-radius: 6px; font-weight: 800; font-size: 0.85rem; border: 1px solid; flex-grow: 1; }
        .master-pass { background: rgba(0, 255, 102, 0.05); color: var(--green); border-color: var(--green); }
        .master-fail { background: rgba(255, 51, 51, 0.05); color: var(--red); border-color: var(--red); }

        .results-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .small-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; border-left: 3px solid var(--blue); position: relative; }
        .card.fail { border-left-color: var(--red); }
        .card.special { border-left-color: var(--gold); }
        
        .title { font-weight: 800; font-size: 0.7rem; text-transform: uppercase; color: #fff; margin-bottom: 2px; display: block; }
        .explanation { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 6px; font-style: italic; }

        .provider-badge { font-size: 0.6rem; color: var(--blue); font-weight: 900; background: rgba(56, 189, 248, 0.1); padding: 2px 6px; border-radius: 4px; margin-bottom: 6px; display: inline-block; border: 1px solid var(--blue); }
        .days-badge { font-size: 0.6rem; color: var(--gold); font-weight: 900; background: rgba(251, 191, 36, 0.1); padding: 2px 6px; border-radius: 4px; display: inline-block; border: 1px solid var(--gold); margin-top: 5px; }
        .days-badge.critical { color: var(--red); background: rgba(255, 51, 51, 0.1); border-color: var(--red); animation: pulse 1.5s infinite; }

        #actionBox { display: none; margin-top: 15px; background: #1a1414; border: 1px solid var(--red); border-radius: 6px; padding: 12px; }
        .action-header { color: var(--red); font-weight: 900; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .pulse-dot { width: 8px; height: 8px; background: var(--red); border-radius: 50%; animation: pulse 1s infinite; }
        .action-list { list-style: none; }
        .action-item { font-size: 0.75rem; color: #ffcccc; margin-bottom: 4px; padding-left: 15px; position: relative; }
        .action-item::before { content: '→'; position: absolute; left: 0; color: var(--red); }

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }

        .record-box { background: #0d1117; border: 1px solid var(--border); padding: 6px 35px 6px 8px; border-radius: 4px; position: relative; font-family: monospace; font-size: 0.75rem; color: #7dd3fc; margin-top: 4px; word-break: break-all; min-height: 26px; display: flex; align-items: center; }
        .copy-btn { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); background: #21262d; border: 1px solid var(--border); color: #8b949e; padding: 2px 4px; font-size: 0.55rem; border-radius: 2px; cursor: pointer; }

        .expiry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .expiry-item { background: #0d1117; padding: 6px; border-radius: 4px; border: 1px solid var(--border); }
        .expiry-label { font-size: 0.55rem; color: var(--text-dim); display: block; text-transform: uppercase; }
        .expiry-val { font-family: monospace; font-size: 0.75rem; color: var(--gold); font-weight: bold; }
        .expiry-val.urgent { color: var(--red); }

        footer { text-align: center; margin-top: 20px; padding: 10px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase; }
    </style>
</head>
<body onload="getClientIP()">

    <div class="header-wrap">
        <h1>STERLING TECH AUDITOR</h1>
        <button id="exportBtn" onclick="exportToCSV()">EXPORT CSV</button>
    </div>

    <div class="util-grid">
        <div class="bar">
            <span style="font-size:0.55rem; display:block; color:var(--text-dim)">LOCAL WAN IP</span>
            <span id="clientIP" class="ip-val" onclick="copyToClipboard(this.innerText, this)">Loading...</span>
        </div>
        <div class="bar gold-acc">
            <span style="font-size:0.55rem; display:block; color:var(--text-dim)">FQDN GENERATOR</span>
            <div class="gen-row">
                <div class="gen-display" id="genDisplay">---<button class="copy-btn" onclick="copyToClipboard(document.getElementById('genDisplay').innerText.replace('COPY',''), this)">COPY</button></div>
                <button class="gen-btn" onclick="manualGenerate()">GEN</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="domainInput" placeholder="Enter target domain to audit...">
        <button id="runBtn" onclick="runAudit()">ANALYZE</button>
    </div>

    <div id="loading" style="display:none; text-align:center; color:var(--blue); margin-bottom:10px; font-size:0.7rem;">Scanning Infrastructure...</div>

    <div class="status-container" id="statContainer">
        <div class="score-circle" id="scoreCircle">0</div>
        <div id="masterStatus"></div>
    </div>
    
    <div class="results-grid" id="results"></div>

    <div id="actionBox">
        <div class="action-header"><div class="pulse-dot"></div> ACTION REQUIRED FOR CLIENT</div>
        <ul class="action-list" id="actionList"></ul>
    </div>

    <footer>&copy; 2026 Sterling Tech</footer>

<script>
    let currentAuditData = {}; 

    function formatToUK(isoDate) {
        if (!isoDate || isoDate === "Unknown") return isoDate;
        const parts = isoDate.split('-');
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    async function runAudit() {
        const domain = document.getElementById('domainInput').value.trim().toLowerCase();
        if (!domain) return;
        document.getElementById('loading').style.display = 'block';
        document.getElementById('results').innerHTML = '';
        document.getElementById('actionBox').style.display = 'none';
        
        try {
            const [spfD, dmarcD, mxD, nsD, rdap] = await Promise.all([
                fetchDNS(domain, 'TXT'), fetchDNS(`_dmarc.${domain}`, 'TXT'), fetchDNS(domain, 'MX'), fetchDNS(domain, 'NS'), fetchRDAP(domain)
            ]);

            const actions = [];
            const isCritical = rdap.days !== null && rdap.days < 30;
            if (isCritical) actions.push(`Domain renewal urgent (${rdap.days} days left)`);

            const lifecycleHtml = `
                <div class="expiry-grid">
                    <div class="expiry-item"><span class="expiry-label">Registrar</span><span class="expiry-val">${rdap.registrar}</span></div>
                    <div class="expiry-item"><span class="expiry-label">Expires</span><span class="expiry-val ${isCritical?'urgent':''}">${rdap.exp}</span></div>
                </div>
                <div class="days-badge ${isCritical?'critical':''}">${rdap.days} DAYS REMAINING</div>`;
            renderCard("Domain Lifecycle", true, lifecycleHtml, "Registration details.", "special");

            const spf = (spfD.Answer || []).find(r => r.data.includes('v=spf1'))?.data.replace(/"/g,'');
            if (!spf) actions.push("Missing SPF record (Email spoofing risk)");
            renderCard("SPF Record", !!spf, spf ? createBox(spf) : createBox("NOT FOUND"), "Authorized senders.");

            const dmarc = (dmarcD.Answer || []).find(r => r.data.includes('v=DMARC1'))?.data.replace(/"/g,'');
            if (!dmarc) actions.push("Missing DMARC record");
            else if (dmarc.includes('p=none')) actions.push("DMARC set to 'None' (Monitoring only)");
            renderCard("DMARC Record", (dmarc && !dmarc.includes('p=none')), dmarc ? createBox(dmarc) : createBox("NOT FOUND"), "Policy instructions.");

            const mxL = (mxD.Answer || []).map(r => r.data);
            const nsL = (nsD.Answer || []).map(r => r.data);
            const row = document.createElement('div'); row.className = 'small-row';
            row.innerHTML = renderSmall("MX Records", mxL, detectProv(mxL)) + renderSmall("Nameservers", nsL, detectProv(nsL));
            document.getElementById('results').appendChild(row);

            let score = (spf ? 35 : 0) + ((dmarc && !dmarc.includes('p=none')) ? 35 : 0) + (nsL.length > 0 ? 30 : 0);
            document.getElementById('scoreCircle').innerText = score;
            document.getElementById('scoreCircle').style.borderColor = score > 70 ? 'var(--green)' : 'var(--red)';
            document.getElementById('masterStatus').className = score > 70 ? 'master-pass' : 'master-fail';
            document.getElementById('masterStatus').innerText = score > 70 ? "STERLING AUDIT: SECURE" : "STERLING AUDIT: ATTENTION REQUIRED";
            document.getElementById('statContainer').style.display = 'grid';
            document.getElementById('exportBtn').style.display = 'block';

            if (actions.length > 0) {
                document.getElementById('actionList').innerHTML = actions.map(a => `<li class="action-item">${a}</li>`).join('');
                document.getElementById('actionBox').style.display = 'block';
            }

            currentAuditData = { domain, registrar: rdap.registrar, spf: spf||'None', dmarc: dmarc||'None', mx: mxL.join(' | '), ns: nsL.join(' | '), exp: rdap.exp };
        } catch (e) { console.error(e); } finally { document.getElementById('loading').style.display = 'none'; }
    }

    function manualGenerate() {
        const d = document.getElementById('domainInput').value.trim().toLowerCase();
        const names = ["ZEUS", "TITAN", "NEO", "ORION", "NOVA", "PHOENIX", "COSMOS", "APOLLO"];
        const name = names[Math.floor(Math.random()*names.length)];
        const host = d ? `${name}.${d}` : name;
        document.getElementById('genDisplay').innerHTML = `${host}<button class="copy-btn" onclick="copyToClipboard('${host}', this)">COPY</button>`;
    }

    async function fetchRDAP(domain) {
        try {
            const res = await fetch(`https://rdap.org/domain/${domain}`);
            const data = await res.json();
            const exp = data.events.find(e => e.eventAction === 'expiration').eventDate.split('T')[0];
            const reg = data.entities.find(e => e.roles.includes('registrar'))?.vcardArray[1].find(v => v[0] === 'fn')[3] || "Unknown";
            const days = Math.ceil((new Date(exp) - new Date()) / (1000*60*60*24));
            return { exp: formatToUK(exp), registrar: reg, days };
        } catch(e) { return { exp: "Error", registrar: "Error", days: 0 }; }
    }

    async function fetchDNS(n, t) {
        const res = await fetch(`https://cloudflare-dns.com/dns-query?name=${n}&type=${t}`, { headers: {'Accept': 'application/dns-json'} });
        return res.json();
    }

    function detectProv(recs) {
        const t = recs.join(' ').toLowerCase();
        if (t.includes('outlook') || t.includes('azure')) return "MICROSOFT";
        if (t.includes('google')) return "GOOGLE";
        if (t.includes('cloudflare')) return "CLOUDFLARE";
        return recs.length > 0 ? "PRIVATE" : "NONE";
    }

    function renderCard(t, p, h, ex, cls="") {
        document.getElementById('results').innerHTML += `<div class="card ${p?'':'fail'} ${cls}"><span class="title">${t}</span><div class="explanation">${ex}</div>${h}</div>`;
    }
    function renderSmall(t, rs, prov) {
        let h = `<div class="provider-badge">${prov}</div>`;
        rs.forEach(r => h += createBox(r));
        return `<div class="card"><span class="title">${t}</span><div class="explanation">DNS infrastructure.</div>${h}</div>`;
    }
    function createBox(v) { return `<div class="record-box"><span>${v}</span><button class="copy-btn" onclick="copyToClipboard('${v.replace(/'/g,"")}', this)">COPY</button></div>`; }
    function copyToClipboard(t, b) { navigator.clipboard.writeText(t); b.innerText = "DONE"; setTimeout(() => b.innerText = "COPY", 1000); }
    
    async function getClientIP() {
        const res = await fetch('https://ipapi.co/json/'); const data = await res.json();
        document.getElementById('clientIP').innerText = data.ip;
    }
    function exportToCSV() {
        const rows = [["Domain", "Registrar", "Expiry", "SPF", "DMARC", "MX", "NS"], 
                      [currentAuditData.domain, currentAuditData.registrar, currentAuditData.exp, currentAuditData.spf, currentAuditData.dmarc, currentAuditData.mx, currentAuditData.ns]];
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI("data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n")));
        link.setAttribute("download", `Sterling_Audit_${currentAuditData.domain}.csv`);
        link.click();
    }
</script>
</body>
</html>
